name: Preview Deploy

on:
  pull_request:

permissions:
  deployments: write
  issues: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    if: !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - id: secrets
        run: echo "has_cloudflare=${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.secrets.outputs.has_cloudflare == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=1web --branch=${{ github.head_ref }} --commit-dirty=true
      - if: always()
        uses: actions/github-script@v8
        env:
          HAS_CLOUDFLARE: ${{ steps.secrets.outputs.has_cloudflare }}
          URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const marker = '<!-- preview -->';
            const hasCloudflare = process.env.HAS_CLOUDFLARE === 'true';
            const url = process.env.URL;

            const body = hasCloudflare
              ? `${marker}\n## Preview\n\n[${url}](${url})`
              : `${marker}\n## Skipped\n\nAdd: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(
                (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
              );
              const method = existing
                ? github.rest.issues.updateComment
                : github.rest.issues.createComment;

              await method({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ...(existing
                  ? { comment_id: existing.id }
                  : { issue_number: context.issue.number }),
                body,
              });
            } catch (error) {
              if (error?.status === 403) {
                console.log(`Preview comment skipped: ${error.message}`);
                return;
              }
              throw error;
            }
