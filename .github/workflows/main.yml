name: CI/CD
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Generate styles
        run: npm run sync:styles
      - name: Run QA checks
        run: npm run qa
      - name: Run unit tests
        run: npm run test:unit
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run E2E Browser tests
        run: npm run test:browser
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  preview:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    needs: [lint, security]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      deployments: write
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-deps
      - name: Generate styles
        run: npm run sync:styles
      - name: Run checks
        run: npm run check
      - id: secrets
        run: |
          echo "has_cloudflare=${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_admin_token=${{ secrets.ADMIN_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.secrets.outputs.has_cloudflare == 'true'
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=1web --branch=${{ github.head_ref }} --commit-dirty=true
      - if: steps.secrets.outputs.has_cloudflare == 'true' && steps.secrets.outputs.has_admin_token == 'true'
        id: rag_sync
        name: Sync Content RAG
        run: npm run sync:content-rag -- --url="${{ steps.deploy.outputs.deployment-url }}" --retries=8 --delay-ms=10000
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      - if: always()
        uses: actions/github-script@v8
        env:
          HAS_CLOUDFLARE: ${{ steps.secrets.outputs.has_cloudflare }}
          HAS_ADMIN_TOKEN: ${{ steps.secrets.outputs.has_admin_token }}
          URL: ${{ steps.deploy.outputs.deployment-url }}
          RAG_SYNC_OUTCOME: ${{ steps.rag_sync.outcome }}
        with:
          script: |
            const m = '<!-- preview -->';
            const hasCloudflare = process.env.HAS_CLOUDFLARE === 'true';
            const hasAdminToken = process.env.HAS_ADMIN_TOKEN === 'true';
            const url = process.env.URL;
            const ragSyncOutcome = process.env.RAG_SYNC_OUTCOME;
            let ragLine = '';

            if (hasCloudflare && hasAdminToken) {
              ragLine = ragSyncOutcome === 'success'
                ? '\n\nRAG sync: ✅ completed'
                : '\n\nRAG sync: ❌ failed';
            } else if (hasCloudflare) {
              ragLine = '\n\nRAG sync: ⚠️ skipped (missing ADMIN_TOKEN secret)';
            }

            const body = hasCloudflare
              ? `${m}\n## 🚀 Preview\n\n[${url}](${url})${ragLine}`
              : `${m}\n## ⚠️ Skipped\n\nAdd: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID`;
            const { data: c } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const e = c.find(x => x.user.type === 'Bot' && x.body.includes(m));
            const fn = e ? github.rest.issues.updateComment : github.rest.issues.createComment;
            await fn({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ...(e ? { comment_id: e.id } : { issue_number: context.issue.number }),
              body,
            });

  production_rag_sync:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - id: secrets
        run: echo "has_admin_token=${{ secrets.ADMIN_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.secrets.outputs.has_admin_token == 'true'
        name: Sync Production Content RAG
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}
        run: |
          SITE_URL="${PRODUCTION_SITE_URL:-https://www.abdulkerimsesli.de}"
          node scripts/sync-content-rag.mjs \
            --url="$SITE_URL" \
            --wait-for-commit="${{ github.sha }}" \
            --retries=20 \
            --delay-ms=15000
      - if: steps.secrets.outputs.has_admin_token != 'true'
        name: Skip Production Content RAG Sync
        run: echo "Skipping production RAG sync because ADMIN_TOKEN is missing."
