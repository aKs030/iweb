name: CI
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'              # schneller dank npm-Cache
      - run: npm ci                 # installiert devDependencies
      - run: npm run test           # oder test:cov
        env:
          CI: 'true'                # triggert isCI in vitest.config.ts