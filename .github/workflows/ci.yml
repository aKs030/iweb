name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install."
          fi

      - name: Run Linter, HTML-Validator, Lighthouse (optional)
        run: |
          if [ -f package.json ]; then
            npm run lint || echo "No linter configured"
            npm run validate-html || echo "No HTML validator configured"
            npm run lighthouse-ci || echo "No Lighthouse config"
          else
            echo "No package.json – skipping QA steps"
          fi

      - name: Generate Sitemap
        run: |
          if [ -f tools/generate-sitemap.js ]; then
            npm run generate-sitemap
          else
            echo "No sitemap script found, skipping."
          fi

      - name: Copy `public/` to `docs/`
        run: |
          mkdir -p docs
          cp -r public/* docs/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: iweb
          directory: docs