name: Admin Maintenance

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge_expired_archives:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - id: secrets
        run: echo "has_admin_token=${{ secrets.ADMIN_TOKEN != '' }}" >> "$GITHUB_OUTPUT"
      - if: steps.secrets.outputs.has_admin_token == 'true'
        name: Purge expired archived profiles
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}
        run: |
          SITE_URL="${PRODUCTION_SITE_URL:-https://www.abdulkerimsesli.de}"
          node scripts/admin-maintenance.mjs --url="$SITE_URL" --limit=250
      - if: steps.secrets.outputs.has_admin_token != 'true'
        name: Skip admin maintenance
        run: echo "Skipping admin maintenance because ADMIN_TOKEN is missing."
