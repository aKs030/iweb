# .github/workflows/deploy.yml
# -------------------------------------------------------------
# CI/CD Pipeline: HTML + CSS + Lighthouse + Security + Summary
# -------------------------------------------------------------

name: '🚀 Deploy to Production'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1) QUALITY-ASSURANCE
  # -------------------------------------------------------------------------
  test:
    name: '🧪 Quality Assurance'
    runs-on: ubuntu-latest

    steps:
      - name: '📥 Checkout code'
        uses: actions/checkout@v4

      - name: '🏗️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: '📦 Install dependencies'
        run: npm ci

      - name: '✅ Validate HTML'
        run: npm run validate-html || true

      - name: '🎨 Validate CSS'
        run: npm run validate-css || true

      - name: '🔗 Check internal links'
        run: |
          node scripts/dev-server.js &
          SERVER_PID=$!
          sleep 5
          npm run check-links || true
          kill $SERVER_PID || true

      - name: '⚡ Lighthouse CI'
        id: lighthouse
        run: |
          npx lhci autorun --config=config/lighthouserc.js | tee lhci-output.log

      - name: '🔗 Extract Lighthouse Public Report URL'
        id: extract_url
        run: |
          REPORT_URL=$(grep -Eo 'https://storage.googleapis.com[^ ]+\.report\.html' lhci-output.log | head -n 1 || true)
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_ENV

      - name: '📤 Upload Lighthouse Results'
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse_results
          path: .lighthouseci/

  # -------------------------------------------------------------------------
  # 2) SECURITY-SCAN
  # -------------------------------------------------------------------------
  security-scan:
    name: '🔒 Security Scan'
    runs-on: ubuntu-latest

    steps:
      - name: '📥 Checkout code'
        uses: actions/checkout@v4

      - name: '🏗️ Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: '📦 Install dependencies'
        run: npm ci

      - name: '🔍 Security audit (npm)'
        run: npm audit --audit-level moderate || echo "Audit warnings found"

      - name: '🛡️ Check Security Headers'
        run: |
          node scripts/dev-server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/ > /dev/null; then break; fi
            echo "Waiting for server… ($i/30)"; sleep 1;
          done

          node scripts/check-security-headers.js http://127.0.0.1:8000

  # -------------------------------------------------------------------------
  # 3) DEPLOYMENT + SUMMARY
  # -------------------------------------------------------------------------
  deploy:
    name: '🌐 Deployment Ready'
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: '📥 Checkout code'
        uses: actions/checkout@v4

      - name: '🚀 Manual deploy step'
        run: |
          echo "Deployment would happen here. Manuell oder via Pages/Cloudflare."

      - name: '📊 Deployment Summary'
        run: |
          {
            echo "## 📊 Deployment Summary"
            echo "- ✅ HTML validation"
            echo "- ✅ CSS validation"
            echo "- ✅ Lighthouse & Security-Header Check"
            echo "- 🔗 [Lighthouse Report](${REPORT_URL:-Link nicht verfügbar})"
            echo "- 🚀 Bereit für Deployment"
          } >> "$GITHUB_STEP_SUMMARY"
