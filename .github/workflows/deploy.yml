# .github/workflows/deploy.yml
# -------------------------------------------------------------
# CI/CD Pipeline – HTML + CSS + Lighthouse + Security-Headers + Manual Deploy
# -------------------------------------------------------------
# Highlights
#  - Caches npm deps
#  - Runs HTML & CSS linters, link checker, Lighthouse CI (3× in CI)
#  - Local security-headers check (headers injected via `serve -H …`)
#  - Uploads Lighthouse artefacts
#  - Generates deployment summary
# -------------------------------------------------------------

name: "🚀 Deploy to Production"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1) QUALITY-ASSURANCE
  # -------------------------------------------------------------------------
  test:
    name: "🧪 Quality Assurance"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🏗️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "✅ Validate HTML"
        run: npm run validate-html || true   # nicht blockierend

      - name: "🎨 Validate CSS"
        run: npm run validate-css || true    # nicht blockierend

      - name: "🔗 Check internal links"
        run: |
          node scripts/dev-server.js &
          SERVER_PID=$!
          sleep 5
          npm run check-links || true
          kill $SERVER_PID && wait $SERVER_PID || true

      - name: "🌐 Start server & check links"
        run: |
          node scripts/express-server.js &
          SERVER_PID=$!
          sleep 5
          npm run check-links || true        # nicht blockierend
          kill $SERVER_PID && wait $SERVER_PID || true

      - name: "⚡ Lighthouse CI"
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse_results   # Unterstrich – gültig für Azure-API
        continue-on-error: true

      - name: "📤 Upload Lighthouse Results"
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse_results
          path: ./.lighthouseci/

  # -------------------------------------------------------------------------
  # 2) SECURITY-SCAN
  # -------------------------------------------------------------------------
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🏗️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: "📦 Install dependencies"
        run: npm ci

      - name: "🔍 Security audit (npm)"
        run: npm audit --audit-level moderate || echo "Audit warnings found"

      - name: "🛡️  Security-Header Check"
        run: |
          node scripts/dev-server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/ > /dev/null; then break; fi
            echo "Waiting for server… ($i/30)"; sleep 1;
          done

          node scripts/check-security-headers.js http://127.0.0.1:8000

  # -------------------------------------------------------------------------
  # 3) DEPLOY
  # -------------------------------------------------------------------------
  deploy:
    name: "🌐 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🚀 Deploy (manual step placeholder)"
        run: |
          echo "🎯 Ready for deployment (manual)."
          echo "Files validated & security checked ✅"

      - name: "📊 Deployment Summary"
        run: |
          {
            echo "## 📊 Deployment Summary"
            echo "- ✅ HTML validation (warnings tolerated)"
            echo "- ✅ CSS validation (warnings tolerated)"
            echo "- ✅ Lighthouse & security headers checked"
            echo "- 🚀 Ready for production deploy"
          } >> "$GITHUB_STEP_SUMMARY"
