name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    concurrency:
      group: qa-${{ github.ref }}
      cancel-in-progress: true

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🏗️ Setup Node.js & Cache
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: 📦 Install dependencies
      run: npm ci

    - name: 📝 Lint, Test & Build
      run: |
        npm run lint
        npm test
        npm run build

    - name: ✅ Validate HTML & CSS
      run: |
        npm run validate-html
        npm run validate-css

    - name: 🔍 Check broken links
      run: npm run check-links

    - name: 🛡️ Security audit
      run: |
        npm audit --audit-level moderate
        git secrets --scan || echo "No secrets found"

    - name: ⚡ Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './lighthouserc.js'
        uploadArtifacts: true
        temporaryPublicStorage: true

  deploy:
    needs: qa
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          # Passe 'dist/' an, falls dein Build-Verzeichnis anders heißt
          rsync -avz --delete ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}

    - name: 📊 Deployment Summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- QA passed" >> $GITHUB_STEP_SUMMARY
        echo "- Deployed to production" >> $GITHUB_STEP_SUMMARY