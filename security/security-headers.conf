# Beispiel Nginx Security Header Konfiguration
# Include via: add_header ... always; oder separate include directive

add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com sha256-K9WmLnXZNonKm1ZThJXtTdZa01o72qlCk4TRxkUq1xw= sha256-3/tZpFDa7mZ0bMj3Z/vnn9t7rm57FDcbV1P+mqgRjJc= sha256-5quy27/OlecHHnU7BVxn3EAwEiSxslEPcPWRsGTms8c= sha256-2T1B6WHceR3weWPsi+cTt0B9SaXiaT85uMNHQD8YHtA= sha256-bxyjtbqvaCRoPbsWM9cB1EZSl6UoxpKFelUYImysCZU=; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self' https://api.github.com https://static.cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
