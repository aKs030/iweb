<!doctype html>
<html lang="de">
  <head>
    <!-- INJECT:GLOBAL-HEAD mode="standalone" title="Offline – Abdulkerim Sesli" theme-color="#030303" color-scheme="dark" status-bar-style="black-translucent" app-title="Offline" -->
    <link rel="stylesheet" href="/content/styles/offline.css" />
  </head>
  <body class="immersive-shell offline-page">
    <main class="offline-card">
      <div class="offline-icon" aria-hidden="true">📡</div>
      <h1>Keine Verbindung</h1>
      <p>
        Du bist offline. Prüfe deine Internetverbindung und versuche es erneut.
      </p>
      <button class="offline-button" id="offline-retry" type="button">
        Erneut versuchen
      </button>
    </main>
    <script>
      document
        .getElementById('offline-retry')
        ?.addEventListener('click', () => window.location.reload());
    </script>
  </body>
</html>
