<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Du bist offline</title>
  <!-- Minimale Inline‑Styles für sofortige Anzeige -->
  <style>
    body {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      margin: 0;
      background: #f8f9fa;
      color: #212529;
      font-family: Poppins, Arial, sans-serif;
      text-align: center;
      padding: 1rem;
    }
    .wrapper { max-width: 480px; }
    img       { width: 64px; height: 64px; margin-bottom: 1rem; }
    h1        { font-size: 1.5rem; margin: 0 0 .5rem; }
    p         { margin: 0 0 1.5rem; }
    button {
      padding: .6rem 1.2rem;
      border: 0;
      border-radius: .25rem;
      background: #0d6efd;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrapper" role="alert" aria-live="polite">
    <span class="visually-hidden">Achtung: Sie sind offline.</span>
    <img src="/img/icon.png" alt="Symbol für keine Verbindung">
    <h1>Keine Internet­verbindung</h1>
    <p>Leider bist du momentan offline. Prüfe deine Verbindung und versuche es noch einmal.</p>
    <button onclick="location.reload()">Neu laden</button>
  </div>
  <script>
    // Automatisches Neuladen, wenn wieder online
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
