<div class="footer-container">
  <style>
    .footer-container {
      --primary-color: #00b894;
      --primary-light: #55efc4;
      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --bg-section: #1a1a1a;
      --bg-hover: #2d2d2d;
      --border-color: #444;
      --radius-md: 8px;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --spacing-2xl: 4rem;
      --transition-base: 0.3s ease;
      --transition-fast: 0.15s ease;
    }

    .footer.section {
  scroll-snap-align: start;
  min-height: 100vh;
}

    .footer-container .footer {
      background: var(--bg-section);
      padding: var(--spacing-2xl) 0 var(--spacing-lg);
      margin-top: var(--spacing-2xl);
      color: var(--text-secondary);
    }

    .footer-container .footer-content {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 2fr;
      gap: var(--spacing-xl);
      margin-bottom: var(--spacing-xl);
    }

    .footer-container .footer-title {
      color: var(--primary-color);
      margin-bottom: var(--spacing-md);
    }

    .footer-container .footer-subtitle {
      font-size: 1.125rem;
      margin-bottom: var(--spacing-md);
    }

    .footer-container .footer-description {
      margin-bottom: var(--spacing-md);
    }

    .footer-container .footer-social {
      display: flex;
      gap: var(--spacing-sm);
    }

    .footer-container .footer-social a {
      width: 40px;
      height: 40px;
      background: var(--bg-hover);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--transition-base);
    }

    .footer-container .footer-social a:hover {
      background: var(--primary-color);
      color: white;
      transform: translateY(-3px);
    }

    .footer-container .footer-links {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .footer-container .footer-links li {
      margin-bottom: var(--spacing-sm);
    }

    .footer-container .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .footer-container .footer-links a:hover {
      color: var(--primary-color);
    }

    .footer-container .newsletter-form {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .footer-container .newsletter-form input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--bg-hover);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      transition: all var(--transition-base);
    }

    .footer-container .newsletter-form input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .footer-container .newsletter-form button {
      padding: 0.75rem 1rem;
      background: var(--primary-color);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .footer-container .newsletter-form button:hover {
      background: var(--primary-light);
    }

    .footer-container .footer-bottom {
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }

    .footer-container .footer-bottom p {
      margin: 0;
    }

    .footer-container .footer-legal {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .footer-container .footer-legal a {
      color: var(--text-secondary);
      transition: color var(--transition-fast);
    }

    .footer-container .footer-legal a:hover {
      color: var(--primary-color);
    }

    @media (max-width: 1024px) {
      .footer-container .footer-content {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .footer-container .footer-content {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .footer-container .footer-social {
        justify-content: center;
      }

      .footer-container .footer-bottom {
        flex-direction: column;
        text-align: center;
      }
    }

    @media print {
      .footer-container .footer-social,
      .footer-container .newsletter-form {
        display: none !important;
      }
    }
  </style>

  <footer class="footer site-footer section">
    <div class="container footer-content">
      <div>
        <h3 class="footer-title">Abdulkerim Sesli</h3>
        <p class="footer-description">Digitale Projekte & Kreativität aus Berlin.</p>
        <div class="footer-social">
          <a href="https://github.com/abdulkerim" target="_blank" rel="noopener" aria-label="GitHub">GH</a>
          <a href="https://linkedin.com/in/abdulkerim" target="_blank" rel="noopener" aria-label="LinkedIn">LI</a>
          <a href="https://instagram.com/abdulkerim" target="_blank" rel="noopener" aria-label="Instagram">IG</a>
        </div>
      </div>
      <div>
        <h4 class="footer-subtitle">Links</h4>
        <ul class="footer-links">
          <li><a href="/">Home</a></li>
          <li><a href="/pages/projekte/">Projekte</a></li>
          <li><a href="/pages/ueber-mich/">Über mich</a></li>
          <li><a href="/pages/kontakt/">Kontakt</a></li>
        </ul>
      </div>
      <div>
        <h4 class="footer-subtitle">Rechtliches</h4>
        <ul class="footer-links">
          <li><a href="/impressum.html">Impressum</a></li>
          <li><a href="/datenschutz.html">Datenschutz</a></li>
        </ul>
      </div>
      <div>
        <h4 class="footer-subtitle">Newsletter</h4>
        <form class="newsletter-form" autocomplete="off">
          <input type="email" name="email" placeholder="E-Mail-Adresse" required>
          <button type="submit">Anmelden</button>
        </form>
      </div>
    </div>
    <div class="container footer-bottom">
      <p>&copy; 2025 Abdulkerim Sesli. Alle Rechte vorbehalten.</p>
      <div class="footer-legal">
        <a href="/impressum.html">Impressum</a>
        <span>|</span>
        <a href="/datenschutz.html">Datenschutz</a>
      </div>
    </div>
  </footer>
</div>
