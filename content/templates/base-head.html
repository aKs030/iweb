<!-- Theme bootstrap (run before stylesheets) -->
<script>
  (function bootstrapTheme() {
    try {
      var root = document.documentElement;
      var storageKey = 'iweb-theme-preference';
      var storedPreference = window.localStorage
        ? window.localStorage.getItem(storageKey)
        : null;
      var prefersLightTheme =
        window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: light)').matches;
      var resolvedTheme =
        storedPreference === 'light' || storedPreference === 'dark'
          ? storedPreference
          : prefersLightTheme
            ? 'light'
            : 'dark';
      root.setAttribute('data-theme', resolvedTheme);
    } catch (_err) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

<!-- Baseline Speculation Rules (runtime manager upgrades this adaptively) -->
<script type="speculationrules" data-injected-by="resource-hints">
  {
    "prerender": [
      {
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": "/api/*" } },
            { "not": { "href_matches": "/functions/*" } },
            {
              "not": {
                "selector_matches": "a[download],a[href^=\"#\"],a[href*=\"?\"],a[target=\"_blank\"],a[href$=\".pdf\"],a[href$=\".zip\"],a[href$=\".mp4\"],a[data-no-speculate],a[data-no-prerender]"
              }
            }
          ]
        },
        "eagerness": "conservative"
      }
    ],
    "prefetch": [
      {
        "source": "list",
        "urls": ["/projekte/", "/gallery/", "/videos/"],
        "eagerness": "conservative"
      }
    ]
  }
</script>
