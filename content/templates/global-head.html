<!-- Theme bootstrap (run before stylesheets) -->
<script id="theme-bootstrap">
  try {
    var d = document.documentElement,
      s = window.localStorage,
      c = s ? s.getItem("iweb-theme-preference") : null,
      m = window.matchMedia("(prefers-color-scheme: light)").matches,
      t =
        d.getAttribute("data-force-theme") ||
        (c === "light" || c === "dark" ? c : m ? "light" : "dark");
    d.setAttribute("data-theme", t);
    var metas = document.querySelectorAll('meta[name="theme-color"]');
    for (var i = 0; i < metas.length; i++) {
      var meta = metas[i];
      if (meta.getAttribute("media")) {
        meta.setAttribute(
          "media",
          (meta.getAttribute("content") || "").toLowerCase() === "#ffffff"
            ? t === "light"
              ? "all"
              : "not all"
            : t === "dark"
              ? "all"
              : "not all"
        );
      }
    }
  } catch (e) {}
</script>

<script id="consent-bootstrap">
  try {
    var root = document.documentElement;
    var consentMatch = document.cookie.match(/(?:^|;\s*)cookie_consent=([^;]+)/);
    var consentValue = consentMatch ? decodeURIComponent(consentMatch[1]) : "";
    var consentResolved = consentValue === "accepted" || consentValue === "rejected";

    if (consentResolved) {
      root.setAttribute("data-cookie-consent", consentValue);
      root.setAttribute("data-cookie-consent-resolved", "true");
    } else {
      root.removeAttribute("data-cookie-consent");
      root.removeAttribute("data-cookie-consent-resolved");
    }
  } catch (e) {}
</script>

<style id="consent-bootstrap-style">
  html[data-cookie-consent-resolved="true"] site-footer #cookie-banner,
  html[data-cookie-consent-resolved="true"] .site-footer #cookie-banner {
    display: none !important;
  }
</style>

<script id="async-css-bootstrap">
  try {
    var activateAsyncCss = function (link) {
      if (!link) return;
      link.media = "all";
      link.dataset.loaded = "true";
    };
    var asyncCssLinks = document.querySelectorAll("link[data-async-css]");
    for (var i = 0; i < asyncCssLinks.length; i++) {
      (function (link) {
        if (!link || link.dataset.loaded === "true") return;
        if (link.sheet) {
          activateAsyncCss(link);
          return;
        }
        var finish = function () {
          activateAsyncCss(link);
        };
        link.addEventListener("load", finish, { once: true });
        link.addEventListener("error", finish, { once: true });
      })(asyncCssLinks[i]);
    }
  } catch (e) {}
</script>
