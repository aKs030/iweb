<script>
  (function adjustDynamicMenuLinks() {
    const pathDepth = location.pathname.replace(/\/$/, '').split('/').length;
    const level = pathDepth > 3 ? '../'.repeat(pathDepth - 3) : './';
    document.querySelectorAll('a[data-path]').forEach((el) => {
      el.setAttribute('href', level + el.getAttribute('data-path'));
    });
  })();
</script>
