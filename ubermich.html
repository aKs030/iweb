    <script>
    // Aktualisiert den aria-current Status für Navigationsbuttons
      function updateAriaCurrent(id) {
          document.querySelectorAll('.section-nav button').forEach((btn) => {
              btn.setAttribute('aria-current', btn.getAttribute('data-target') === `#${id}` ? 'true' : 'false');
          });
      }
      
      // DOMContentLoaded: Hauptlogik
      document.addEventListener('DOMContentLoaded', () => {
          const sections = document.querySelectorAll('.snap-ubermichbox');
          const navButtons = document.querySelectorAll('.section-nav button');
      
          // IntersectionObserver für sichtbare Sektionen
          const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                      navButtons.forEach((button) => button.classList.remove('active'));
                      const activeButton = document.querySelector(`.section-nav button[data-target="#${entry.target.id}"]`);
                      if (activeButton) activeButton.classList.add('active');
                      updateAriaCurrent(entry.target.id);
                      entry.target.classList.add('is-visible');
                  } else {
                      entry.target.classList.remove('is-visible');
                  }
              });
          }, { threshold: 0.5 });
      
          sections.forEach((section) => observer.observe(section));
      
          // LazyLoad für Bilder
          const lazyImages = document.querySelectorAll('.lazyload');
          const imageObserver = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                      const img = entry.target;
                      img.src = img.dataset.src;
                      img.classList.remove('lazyload');
                      imageObserver.unobserve(img);
                  }
              });
          });
      
          lazyImages.forEach((img) => imageObserver.observe(img));
      });
      
      // Navigation: Aktiver Link
      document.addEventListener('DOMContentLoaded', () => {
          const sections = document.querySelectorAll('.snap-ubermichbox');
          const navLinks = document.querySelectorAll('.section-nav button');
      
          function setActiveLink(sectionId) {
              navLinks.forEach((link) => {
                  link.classList.remove('blink');
                  if (link.getAttribute('data-target') === `#${sectionId}`) {
                      link.classList.add('blink');
                  }
              });
          }
      
          const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                      const sectionId = entry.target.getAttribute('id');
                      setActiveLink(sectionId);
                  }
              });
          }, { threshold: 0.6 });
      
          sections.forEach((section) => observer.observe(section));
      });
      
      // Überprüfung der Scroll-Position
      document.addEventListener('DOMContentLoaded', () => {
          const contentContainer = document.querySelector('.content-container');
          const button = document.querySelector('.button-runter');
      
          const checkScrollPosition = () => {
              const scrollTop = contentContainer.scrollTop;
              const clientHeight = contentContainer.clientHeight;
              const scrollHeight = contentContainer.scrollHeight;
      
              const isScrolledToEnd = scrollTop + clientHeight >= scrollHeight - 10;
              if (isScrolledToEnd) {
                  button.classList.add('visible');
              } else {
                  button.classList.remove('visible');
              }
          };
      
          if (contentContainer && button) {
              contentContainer.addEventListener('scroll', checkScrollPosition);
              checkScrollPosition();
          } else {
              console.error('contentContainer oder Button nicht gefunden.');
          }
      });
      
      // Scroll zu einer bestimmten Sektion
      function scrollToSection(id) {
          document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
      }
      
      // Highlight aktiver Button basierend auf sichtbarer Sektion
      document.addEventListener('DOMContentLoaded', () => {
          const sections = document.querySelectorAll('.snap-ubermichbox');
          const navButtons = document.querySelectorAll('.section-nav button');
      
          const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                      const targetId = entry.target.id;
                      navButtons.forEach((button) => {
                          button.classList.toggle('active', button.getAttribute('data-target') === `#${targetId}`);
                      });
                  }
              });
          }, { threshold: 0.5 });
      
          sections.forEach((section) => observer.observe(section));
      });
      
      // Funktion, um einen bestimmten TEXT aus der Datei zu laden
      function loadSection(filePath, sectionName) {
          return fetch(filePath)
              .then(response => {
                  if (!response.ok) throw new Error(`Fehler: ${response.statusText}`);
                  return response.text();
              })
              .then(data => {
                  const regex = new RegExp(`<!-- SECTION:${sectionName} -->([\\s\\S]*?)(?=<!-- SECTION:|$)`, 'g');
                  const match = regex.exec(data);
                  return match ? match[1].trim() : 'Abschnitt nicht gefunden.';
              })
              .catch(error => {
                  console.error(`Fehler beim Laden des Abschnitts ${sectionName}:`, error);
                  return 'Fehler beim Laden des Abschnitts.';
              });
      }
      
      // Liste von Containern und den zu ladenden Abschnitten
      const sectionsToLoad = [
          { containerId: 'section-ubersicht', section: 'UBERSICHT' },
          { containerId: 'section-person', section: 'PERSON' },
          { containerId: 'section-hobbys', section: 'HOBBYS' },
          { containerId: 'section-karriere', section: 'KARRIERE' },
          { containerId: 'section-kontakt', section: 'KONTAKT' },
      ];
      
      // Inhalte in die jeweiligen Container laden
      sectionsToLoad.forEach(({ containerId, section }) => {
          loadSection('content.txt', section).then(content => {
              const container = document.getElementById(containerId);
              if (container) {
                  container.innerHTML = content;
              }
          });
      });</script>

    <style>
      /* ===========================
   Basis- und Reset-Stile
=========================== */
*,
*::before,
*::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
    scroll-snap-type: y mandatory;
    overscroll-behavior-y: contain; /* Verhindert zusätzliches Scrollen */
}

body {
    height: 100vh;
    overflow: hidden;
}

/* ===========================
   Container / Sektionen
=========================== */
.content-container {
    display: flex;
    flex-direction: column;
    scroll-snap-type: y mandatory;
    overflow-y: auto;
    height: 100vh;
    padding-top: 20px; /* Optional: Abstand oben */
}

.snap-ubermichbox {
    min-height: 100vh; /* Sicherstellung der vollen Höhe */
    height: 100vh; /* Optional */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    scroll-snap-align: center;
    padding: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

.snap-ubermichbox.is-visible {
    opacity: 1;
    transform: translateY(0);
}

/* ===========================
   Navigation (Desktop & Mobile)
=========================== */
.section-nav {
    position: fixed;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.section-nav button {
    font-size: 14px;
    color: #4a4a4a;
    background: #fff;
    border: 2px solid #007BFF;
    border-radius: 20px;
    padding: 10px 15px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.section-nav button:hover {
    color: #fff;
    background-color: #0056b3;
}

.section-nav button.active {
    color: #fff;
    background-color: #007BFF;
    transform: scale(1.1);
}

/* ===========================
   Button "runter"
=========================== */
.button-runter {
    position: fixed;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 16px;
    border-radius: 48px;
    border: 1px solid #777;
    background-color: #fff;
    color: #000;
    padding: 13px;
    opacity: 1;
    transition: background-color 0.1s, box-shadow 0.1s, border 0.1s, opacity 0.3s;
}

.button-runter.visible {
    opacity: 1;
    pointer-events: auto;
}

.button-runter.klein {
    font-size: 14px;
    padding: 12px;
    border-radius: 42px;
}

.button-runter img {
    width: 16px;
    height: 16px;
}

.button-runter.klein img {
    width: 14px;
    height: 14px;
}

/* ===========================
   Barrierefreiheit
=========================== */
button:focus,
button:focus-visible {
    outline: none;
    box-shadow: 0 0 5px 2px #007BFF;
}

/* ===========================
   Banner
=========================== */
.banner-gif-150 {
    background: url('../img/dummy-background.gif') no-repeat center;
    background-size: cover;
    height: 100px;
}

.banner-gif-150 img {
    width: auto;
    height: 0;
    object-fit: cover;
}

/* ===========================
   Desktop Layout
=========================== */
@media (min-width: 769px) {
    .section-nav {
        top: 50%;
        left: 10px;
        width: 120px;
        transform: translateY(-50%);
    }

    .content-container {
        margin-left: 10px;
    }

    .section-text {
        font-size: clamp(0.8rem, 0.8vw, 0.8rem);
        line-height: 1.4;
        text-align: justify;
        color: #555;
        margin-left: 20%;
        margin-right: 20%;
    }
}

/* ===========================
   Mobile Layout
=========================== */
@media (max-width: 768px) {
    body {
        font-size: 16px;
    }

    .section-text {
        font-size: clamp(0.7rem, 0.7vw, 0.7rem);
        line-height: 1.1;
        text-align: justify;
        color: #555;
        margin-left: auto;
        margin-right: auto;
        width: 95%;
    }

    .snap-ubermichbox {
        font-size: 14px;
        padding: 20px;
    }

    .section-nav {
        top: 90px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        gap: 10px;
    }

    .section-nav button {
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 15px;
    }

    .button-runter {
        font-size: 14px;
        padding: 10px;
        border-radius: 36px;
    }

    .button-runter img {
        width: 14px;
        height: 14px;
    }

    .button-runter.klein img {
        width: 12px;
        height: 12px;
    }
}

/* ===========================
   Animationen
=========================== */
.pulse-primary {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.4);
    }
    70% {
        box-shadow: 0 0 0 20px rgba(0, 123, 255, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(0, 123, 255, 0);
    }
}
    </style>
