<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulkerim</title>
    <link rel="icon" type="image/png" href="icon.png">

    <!-- CSS-Dateien -->
    <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" rel="stylesheet">
    <link href="css/frame.css" rel="stylesheet">
    <link href="css/controls.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">
    <link href="f.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Sans+Pro:400,700" rel="stylesheet">

    <!-- Styles für Scroll Snap -->
    <style>
        html, body {
            margin: 0;
            height: 100%;
            scroll-snap-type: y mandatory;
            font-family: 'Open Sans', Arial, sans-serif;
        }
        .scroll-snap-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            scroll-snap-align: start;
            color: white;
            font-size: 1.5rem;
            padding: 20px;
        }
        .snap-1 { background-color: #4CAF50; }
        .snap-2 { background-color: #2196F3; }
        .snap-3 { background-color: #FF9800; }

        /* Navigation */
        .scroll-snap-nav {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .snap-nav-link {
            width: 15px;
            height: 15px;
            background-color: white;
            border-radius: 50%;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .snap-nav-link.active, .snap-nav-link:hover {
            opacity: 1;
            background-color: black;
        }
    </style>
</head>

<body>
    <!-- Menü und <!-- Menü Navigation -->
<div class="menu-container">
    <nav class="top-menu">
        <ul>
            <li><a href="#snap-1">Über mich</a></li>
            <li><a href="#snap-2">Fotogalerie</a></li>
            <li><a href="#snap-3">Kontakt</a></li>
        </ul>
    </nav>
</div>

    <!-- Inhalte -->
    <div id="snap-1" class="scroll-snap-section snap-1">
        <h2>Über mich:</h2>
        <p>Ich teile hier meine Leidenschaften, Interessen und Erlebnisse.</p>
    </div>

    <div id="snap-2" class="scroll-snap-section snap-2">
        <h2>Fotogalerie:</h2>
        <p>Hier findest du Fotos von meinen Reisen und besonderen Ereignissen.</p>
    </div>

    <div id="snap-3" class="scroll-snap-section snap-3">
        <h2>Kontakt:</h2>
        <p>Kontaktiere mich per E-Mail: <a href="mailto:mail@abdulkerimsesli.com">mail@abdulkerimsesli.com</a></p>
    </div>

    <!-- JavaScript -->
    <script>
        const sections = document.querySelectorAll('.scroll-snap-section');
        const navLinks = document.querySelectorAll('.snap-nav-link');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - section.clientHeight / 3) {
                    current = section.getAttribute('id');
                }
            });
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
