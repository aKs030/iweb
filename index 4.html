<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulkerim - Persönliche Homepage</title>
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Sans+Pro:400,700" rel="stylesheet">
    <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" rel="stylesheet">

    <!-- Menü CSS -->
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/frame.css">

    <style>
        /* Allgemeine Grundstile */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', Arial, sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Menü Einbindung */
        .menu-container {
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.9);
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Scroll Snap Abschnitte */
        .snap-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            scroll-snap-align: start;
        }

        #section-1 {
            background-color: #4CAF50;
            position: relative;
        }

        /* Buchstaben-Animation */
        .scroll-animation h1 {
            font-size: 2.5rem;
            color: white;
            margin: 0;
            letter-spacing: 3px;
        }

        .scroll-animation span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
    </style>
</head>

<body>
    <!-- Menü Einbindung -->
    <div class="menu-container">
        <div class="menu">
            <div class="menu-table flex-row-space-between">
                <div class="logo">
                    <a href="index.html">ABDULKERIM</a>
                </div>
                <div class="menu-items">
                    <a href="#section-1">Über mich</a>
                    <a href="#section-2">Fotogalerie</a>
                    <a href="#section-3">Kontakt</a>
                    <a href="#section-4">Vielen Dank</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scrollbare Abschnitte -->
    <div id="section-1" class="snap-section">
        <div class="content">
            <!-- Animierter Text -->
            <div class="scroll-animation" id="scroll-text">
                <h1>
                    <span>Ich</span>
                    <span>freue</span>
                    <span>mich,</span>
                    <span>dass</span>
                    <span>du</span>
                    <span>den</span>
                    <span>Weg</span>
                    <span>hierher</span>
                    <span>gefunden</span>
                    <span>hast.</span>
                </h1>
            </div>
        </div>
    </div>

    <div id="section-2" class="snap-section" style="background-color: #2196F3;">
        <h1>Fotogalerie</h1>
        <p>Hier findest du Bilder aus meinen Erlebnissen.</p>
    </div>

    <div id="section-3" class="snap-section" style="background-color: #FF9800;">
        <h1>Kontakt</h1>
        <p>Du kannst mich per E-Mail erreichen: <a href="mailto:mail@abdulkerimsesli.com" style="color: white;">mail@abdulkerimsesli.com</a></p>
    </div>

    <!-- JavaScript für Buchstaben-Einblendung -->
    <script>
        const textContainer = document.querySelector('.scroll-animation');
        const spans = textContainer.querySelectorAll('span');

        window.addEventListener('scroll', () => {
            const rect = textContainer.getBoundingClientRect();
            const triggerPoint = window.innerHeight - 100;

            if (rect.top < triggerPoint) {
                spans.forEach((span, index) => {
                    setTimeout(() => {
                        span.style.opacity = 1;
                        span.style.transform = 'translateY(0)';
                    }, index * 50); // Buchstaben schneller anzeigen
                });
            } else {
                spans.forEach((span) => {
                    span.style.opacity = 0;
                    span.style.transform = 'translateY(20px)';
                });
            }
        });
    </script>
</body>
</html>
