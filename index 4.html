<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll-animierter Text</title>
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Sans+Pro:400,700" rel="stylesheet">

    <style>
        /* Grundlegende Stile */
        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', Arial, sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .snap-section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            scroll-snap-align: start;
            color: white;
        }

        #section-1 {
            background-color: #4CAF50;
            position: relative;
        }

        /* Scroll-Animation */
        .scroll-animation h1 {
            font-size: 2rem;
            text-transform: uppercase;
            color: white;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .scroll-animation span {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
    </style>
</head>

<body>
    <!-- Scrollbare Abschnitte -->
    <div id="section-1" class="snap-section">
        <div class="content">
            <!-- Text mit Scroll-Animation -->
            <div class="scroll-animation" id="scroll-text">
                <h1>
                    <span>Ich</span>
                    <span>freue</span>
                    <span>mich,</span>
                    <span>dass</span>
                    <span>du</span>
                    <span>den</span>
                    <span>Weg</span>
                    <span>hierher</span>
                    <span>gefunden</span>
                    <span>hast.</span>
                </h1>
            </div>
        </div>
    </div>

    <div id="section-2" class="snap-section" style="background-color: #2196F3;">
        <h1 style="color: white;">Willkommen in der Fotogalerie!</h1>
    </div>

    <!-- JavaScript für Scroll-abhängige Animation -->
    <script>
        const textContainer = document.querySelector('.scroll-animation');
        const spans = textContainer.querySelectorAll('span');

        window.addEventListener('scroll', () => {
            const rect = textContainer.getBoundingClientRect();
            const scrollProgress = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / window.innerHeight));

            spans.forEach((span, index) => {
                const delay = index * 0.1; // Verzögerung pro Wort
                const progress = scrollProgress - delay;

                if (progress > 0 && progress < 1) {
                    span.style.opacity = Math.min(1, progress * 2);
                    span.style.transform = `translateY(${30 * (1 - progress)}px)`;
                } else if (progress <= 0) {
                    span.style.opacity = 0; // Zurücksetzen, wenn man nach oben scrollt
                    span.style.transform = 'translateY(30px)';
                } else {
                    span.style.opacity = 1; // Voll sichtbar am Ende
                    span.style.transform = 'translateY(0)';
                }
            });
        });
    </script>
</body>
</html>
