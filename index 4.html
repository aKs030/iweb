<!doctype html>
<html lang="de">
<head>
  <title>Abdulkerim</title>

  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="icon.png">
  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="f.css" media="screen" rel="stylesheet" type="text/css" />

  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700' rel='stylesheet' type='text/css'>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
 
  <script src="f.js"></script>

  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>
  <style>
    .menu-index {
      color: rgb(255, 255, 255) !important;
      opacity: 1 !important;
      font-weight: 700 !important;
    }
  </style>
</head>

<body>
    <!-- Menü und <!-- Menü Navigation -->
<div class="menu-container">
    <nav class="top-menu">
        <ul>
            <li><a href="#snap-1">Über mich</a></li>
            <li><a href="#snap-2">Fotogalerie</a></li>
            <li><a href="#snap-3">Kontakt</a></li>
        </ul>
    </nav>
</div>

    <!-- Inhalte -->
    <div id="snap-1" class="scroll-snap-section snap-1">
        <h2>Über mich:</h2>
        <p>Ich teile hier meine Leidenschaften, Interessen und Erlebnisse.</p>
    </div>

    <div id="snap-2" class="scroll-snap-section snap-2">
        <h2>Fotogalerie:</h2>
        <p>Hier findest du Fotos von meinen Reisen und besonderen Ereignissen.</p>
    </div>

    <div id="snap-3" class="scroll-snap-section snap-3">
        <h2>Kontakt:</h2>
        <p>Kontaktiere mich per E-Mail: <a href="mailto:mail@abdulkerimsesli.com">mail@abdulkerimsesli.com</a></p>
    </div>

    <!-- JavaScript -->
    <script>
        const sections = document.querySelectorAll('.scroll-snap-section');
        const navLinks = document.querySelectorAll('.snap-nav-link');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - section.clientHeight / 3) {
                    current = section.getAttribute('id');
                }
            });
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
