<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Über mich</title>
  
  <!-- CSS -->
  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css"/>
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css"/>
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="f.css">
  <!-- JS -->
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700' rel='stylesheet' type='text/css'>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>
  <script src="f.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sections = document.querySelectorAll('.snap-ubermichbox');
      const navButtons = document.querySelectorAll('.section-nav button');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            navButtons.forEach((button) => button.classList.remove('active'));
            const activeButton = document.querySelector(`.section-nav button[data-target="#${entry.target.id}"]`);
            if (activeButton) activeButton.classList.add('active');
            updateAriaCurrent(entry.target.id);
            entry.target.classList.add('is-visible');
          } else {
            entry.target.classList.remove('is-visible');
          }
        });
      }, { threshold: 0.5 });

      sections.forEach((section) => observer.observe(section));

      const lazyImages = document.querySelectorAll('.lazyload');
      const imageObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.classList.remove('lazyload');
            imageObserver.unobserve(img);
          }
        });
      });

      lazyImages.forEach((img) => imageObserver.observe(img));

      const toggleMode = () => {
        document.body.classList.toggle('dark-mode');
      };

      const toggleButton = document.createElement('button');
      toggleButton.textContent = 'Dark Mode';
      toggleButton.className = 'mode-toggle';
      toggleButton.addEventListener('click', toggleMode);

      document.querySelector('.sticky-nav').appendChild(toggleButton);
    });

    const updateAriaCurrent = (id) => {
      document.querySelectorAll('.section-nav button').forEach((btn) => {
        btn.setAttribute('aria-current', btn.getAttribute('data-target') === `#${id}` ? 'true' : 'false');
      });
    };

    function scrollToSection(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    document.addEventListener('scroll', () => {
      const progressBar = document.querySelector('.progress-bar');
      const totalHeight = document.body.scrollHeight - window.innerHeight;
      const progress = (window.scrollY / totalHeight) * 100;
      progressBar.style.width = `${progress}%`;
    });

  </script>

  <style>
   :root {
  --background-color: #f5f5f5;
  --text-color: #000;
}

body.dark-mode {
  --background-color: #1a1a1a;
  --text-color: #fff;
}

body {
  background-color: var(--background-color);
  color: var(--text-color);
  transition: background-color 0.3s, color 0.3s;
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    .content-container {
      display: flex;
      flex-direction: column;
      scroll-snap-type: y mandatory;
      overflow-y: auto;
      height: 100vh;
      padding-left: 200px;
      box-sizing: border-box;
    }

    .snap-ubermichbox {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      scroll-snap-align: start;
      background-color: #f5f5f5;
      padding: 5%;
      box-sizing: border-box;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .snap-ubermichbox.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-nav {
      position: fixed;
      top: 50%;
      left: 3%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000; /* Höhere Priorität */

    }

    .section-nav button {
      font-size: 14px;
      color: #4a4a4a;
      background: #fff;
      border: 2px solid #007BFF;
      border-radius: 20px;
      padding: 10px 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .section-nav button.active {
      color: #fff;
      background-color: #007BFF;
      transform: scale(1.1);
    }

    .section-nav button:hover {
      color: #fff;
      background-color: #0056b3;
    }

    .button-runter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: none;
      font-size: 14px;
      color: #007BFF;
      cursor: pointer;
      text-transform: uppercase;
    }

    .button-runter img {
      width: 20px;
      margin-left: 5px;
    }

    @media (max-width: 768px) {
      .section-nav {
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        gap: 10px;
        z-index: 99999; /* Sehr hohe Priorität */
      }

      .content-container {
        padding-left: 0;
        margin-top: 60px;
      }

      .section-nav button {
        font-size: 12px;
        padding: 8px 12px;
      }
    }

  </style>
</head>

<body>
  <div class="menu-container"></div>
  <div class="content-container">
    <nav class="section-nav" aria-label="Hauptnavigation">
        <button data-target="#section1" onclick="scrollToSection('section1');" aria-current="true">Überblick</button>
        <button data-target="#section2" onclick="scrollToSection('section2');">Persönlich</button>
        <button data-target="#section3" onclick="scrollToSection('section3');">Hobbys</button>
        <button data-target="#section4" onclick="scrollToSection('section4');">Karriere</button>
        <button data-target="#section5" onclick="scrollToSection('section5');">Kontakt</button>
      </nav>

      
      <div class="progress-bar"></div>

    <!-- Sections -->
    <section class="snap-ubermichbox" id="section1">
      <h1>Überblick</h1>
      <p>Willkommen auf meiner Seite!</p>
      <button class="button-runter" onclick="document.getElementById('section2').scrollIntoView({behavior: 'smooth'});">
         <img data-src="img/down.png" alt="Weiter" class="lazyload">
      </button>
    </section>

    <section class="snap-ubermichbox" id="section2">
      <h1>Persönlich</h1>
      <p>Hallo, ich bin Abdulkerim und freue mich, dass du meine Seite besuchst!</p>
      <button class="button-runter" onclick="document.getElementById('section3').scrollIntoView({behavior: 'smooth'});">
        <img data-src="img/down.png" alt="Weiter" class="lazyload">
      </button>
    </section>

    <section class="snap-ubermichbox" id="section3">
      <h1>Hobbys</h1>
      <p>Ich genieße Reisen, Musik und spannende Technologien.</p>
      <button class="button-runter" onclick="document.getElementById('section4').scrollIntoView({behavior: 'smooth'});">
        <img data-src="img/down.png" alt="Weiter" class="lazyload">
    </button>
    </section>
  </div>
</body>
</html>
