  <!-- Custom JS -->
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // --- Navigation & Animation Observer ---
      const navItems = document.querySelectorAll(".nav-item");
      const sections = document.querySelectorAll("section");
      // Wähle alle Elemente mit .scroll-animate UND .text-animate
      const animateElements = document.querySelectorAll(".scroll-animate, .text-animate");
      const navLinks = document.querySelectorAll(".nav-link");

      // Alle zu beobachtenden Elemente (ohne Duplikate)
      const observedElements = [...new Set([...sections, ...animateElements])];

      const navObserverOptions = {
        threshold: 0.5,
        rootMargin: "0px 0px -50px 0px"
      };

      const navObserverCallback = (entries) => {
        entries.forEach(({ target, isIntersecting }) => {
          // Animation für Elemente mit .scroll-animate oder .text-animate (außer full-visible)
          if ((target.classList.contains("scroll-animate") || target.classList.contains("text-animate"))
              && !target.classList.contains("full-visible")) {
            const animationClass = target.dataset.animation || "animate__fadeInUp";
            const delayInS = (parseFloat(target.dataset.delay) || 0) / 1000;
            target.style.transitionDelay = `${delayInS}s`;
            if (isIntersecting) {
              target.classList.add("visible", "animate__animated", animationClass);
            } else {
              target.classList.remove("visible", "animate__animated", animationClass);
            }
          }
          // Navigation-Aktivierung anhand der Section-ID
          if (target.id && isIntersecting) {
            navItems.forEach(item => item.classList.remove("active"));
            const activeNavItem = document.querySelector(`.nav-item[data-section="${target.id}"]`);
            if (activeNavItem) activeNavItem.classList.add("active");
          }
        });
      };

      const navObserver = new IntersectionObserver(navObserverCallback, navObserverOptions);
      observedElements.forEach(el => navObserver.observe(el));

      // Klick-Event: Sanftes Scrollen & Navigation-Aktivierung
      navLinks.forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const targetId = link.getAttribute("href").substring(1);
          const targetSection = document.getElementById(targetId);
          if (targetSection) {
            targetSection.scrollIntoView({ behavior: "smooth", block: "start" });
            navItems.forEach(item => item.classList.remove("active"));
            const clickedNavItem = link.closest(".nav-item");
            if (clickedNavItem) clickedNavItem.classList.add("active");
          }
        });
      });

      // --- Feature Cards Observer & Hover-/Touch-Effekte ---
      const featureCards = document.querySelectorAll("#features .card");
      let activeCardIndex = 0;
      let initialLoad = true; // Flag, um initiales Scrollen zu unterdrücken

      const setActiveCard = (index) => {
        featureCards.forEach((card, i) => {
          card.classList.toggle("active", i === index);
          if (!initialLoad && i === index) {
            card.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        });
      };

      const cardObserverOptions = {
        root: null,
        threshold: 0.5
      };

      const cardObserverCallback = (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const index = Array.from(featureCards).indexOf(entry.target);
            if (index !== activeCardIndex) {
              activeCardIndex = index;
              setActiveCard(activeCardIndex);
            }
          }
        });
      };

      const cardObserver = new IntersectionObserver(cardObserverCallback, cardObserverOptions);
      featureCards.forEach(card => cardObserver.observe(card));

      // Unterschiedliche Event-Listener je nach Geräteunterstützung
      if (window.matchMedia('(hover: none)').matches) {
        featureCards.forEach(card => {
          card.addEventListener("touchstart", () => card.classList.add("active"));
          card.addEventListener("touchend", () => {
            setTimeout(() => { card.classList.remove("active"); }, 500);
          });
        });
      } else {
        featureCards.forEach(card => {
          card.addEventListener("mouseenter", () => card.classList.add("active"));
          card.addEventListener("mouseleave", () => card.classList.remove("active"));
        });
      }
      // Initialisiere die erste Karte als aktiv
      setActiveCard(activeCardIndex);

      // --- Observer für Elemente, die 100% sichtbar sein müssen ---
      const fullObserverOptions = {
        threshold: 0.5  // 100% sichtbar
      };

      const fullObserverCallback = (entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio === 1) {
            const animationClass = entry.target.dataset.animation || "animate__fadeInUp";
            const delayInS = (parseFloat(entry.target.dataset.delay) || 0) / 1000;
            entry.target.style.transitionDelay = `${delayInS}s`;
            entry.target.classList.add("visible", "animate__animated", animationClass);
            // Beobachtung stoppen, wenn die Animation einmal ausgelöst wurde
            observer.unobserve(entry.target);
          }
        });
      };

      const fullObserver = new IntersectionObserver(fullObserverCallback, fullObserverOptions);
      document.querySelectorAll(".full-visible").forEach(el => fullObserver.observe(el));
    });
  </script>
