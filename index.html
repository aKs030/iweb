<!-- Navigation -->
<nav class="navbar navbar-bottom">

<script>
  document.addEventListener("DOMContentLoaded", () => {

    /* --- 1) Intersection Observer --- */
    const sections = document.querySelectorAll("section");
    const scrollAnimateElements = document.querySelectorAll(".scroll-animate");
    const navItems = document.querySelectorAll(".nav-item");

    // Alle zu beobachtenden Elemente in ein Set (zur Vermeidung doppelter Einträge)
    const observerTargets = new Set([...sections, ...scrollAnimateElements]);

    // IntersectionObserver Callback
    const observerCallback = (entries, observer) => {
      entries.forEach(({ target, isIntersecting }) => {
        
        // A) Animationstrigger für .scroll-animate
        if (target.classList.contains("scroll-animate")) {
          const animationClass = target.dataset.animation || "animate__fadeInUp";

          if (isIntersecting) {
            target.classList.add("visible", "animate__animated", animationClass);
            target.classList.remove("hidden");

            // -> Falls du es bei einmaliger Animation belassen willst:
            // observer.unobserve(target);
          } else {
            // Element verlässt den Viewport -> Klassen entfernen
            target.classList.remove("visible", "animate__animated", animationClass);
            target.classList.add("hidden");
          }
        }

        // B) Aktives Nav-Item setzen, wenn <section> mit ID
        if (target.tagName.toLowerCase() === "section" && target.id) {
          if (isIntersecting) {
            const activeNavItem = document.querySelector(`.nav-item[data-section="${target.id}"]`);
            if (activeNavItem) {
              navItems.forEach((item) => item.classList.remove("active"));
              activeNavItem.classList.add("active");
            }
          }
        }
      });
    };

// Beispiel: Wenn Viewport schmaler als 768px => nutze andere threshold/rootMargin
const isMobile = window.matchMedia("(max-width: 768px)").matches;

const observerOptions = isMobile
  ? { threshold: 0.3, rootMargin: "0px 0px -30px 0px" } 
  : { threshold: 0.8, rootMargin: "0px 0px -50px 0px" };

const observer = new IntersectionObserver(observerCallback, observerOptions);


//    const observer = new IntersectionObserver(observerCallback, {
//  threshold: 0.8,
//      rootMargin: "0px 0px -50px 0px",
//    });



    // Relevante Elemente beobachten
    observerTargets.forEach((el) => observer.observe(el));

    /* --- 2) Smooth Scrolling für Navigation --- */
    const navLinks = document.querySelectorAll(".nav-link");
    navLinks.forEach((link) => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const targetId = link.getAttribute("href").substring(1);
        const targetSection = document.getElementById(targetId);
        if (targetSection) {
          targetSection.scrollIntoView({ behavior: "smooth", block: "start" });
          navItems.forEach((item) => item.classList.remove("active"));
          const clickedNavItem = link.closest(".nav-item");
          if (clickedNavItem) clickedNavItem.classList.add("active");
        }
      });
    });

    /* --- 3) Back-to-Top-Button --- */
    const backToTopBtn = document.getElementById("back-to-top");
    if (backToTopBtn) {
      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      window.addEventListener("scroll", throttle(() => {
        backToTopBtn.classList.toggle("visible", window.scrollY > 500);
      }, 150), { passive: true });
    }

    /* --- 4) Throttle-Funktion für Scroll Events --- */
    function throttle(fn, wait) {
      let lastTime = 0;
      return function(...args) {
        const now = Date.now();
        if (now - lastTime >= wait) {
          fn.apply(this, args);
          lastTime = now;
        }
      };
    }
  });
</script>
