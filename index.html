<body>

    <a class="visually-hidden-focusable" href="#main-content">Zum Inhalt springen</a>

    <header role="banner">
        <div id="menu-container"></div>
    </header>

    <noscript>
        <div style="text-align:center;padding:1rem;background-color:#ffcc00;color:#000;">
            <strong>Hinweis:</strong> Diese Website benötigt JavaScript, um korrekt zu funktionieren. Bitte aktivieren Sie JavaScript in Ihrem Browser.
        </div>
    </noscript>

    <main id="main-content" class="viewport-box">
        <section class="sections-container snap-section" id="section-hero"></section>
        <section class="sections-container snap-section" id="section-features"></section>
        <section class="sections-container snap-section" id="section-about"></section>

        <div class="dots-nav" aria-label="Seitennavigation" role="tablist" aria-orientation="vertical">
            <div class="dot active" data-target="section-hero" aria-label="Zur Startseite" role="tab" aria-controls="section-hero" aria-selected="true" tabindex="0"></div>
            <div class="dot" data-target="section-features" aria-label="Zu den Features" role="tab" aria-controls="section-features" aria-selected="false" tabindex="-1"></div>
            <div class="dot" data-target="section-about" aria-label="Über mich" role="tab" aria-controls="section-about" aria-selected="false" tabindex="-1"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const animatedIcons = document.querySelectorAll('.card .animated-icon');

            animatedIcons.forEach(icon => {
                const card = icon.closest('.card'); // Finde die übergeordnete Karte

                if (card) {
                    const handleAnimationEnd = () => {
                        icon.classList.add('js-rotated'); // Verhindert weitere Animationen über CSS :not()
                    };

                    const handleMouseEnter = () => {
                        if (!icon.classList.contains('js-rotated')) {
                            icon.addEventListener('transitionend', handleAnimationEnd, { once: true });
                        }
                    };

                    card.addEventListener('mouseenter', handleMouseEnter);
                }
            });
        });
    </script>

    <script src="/js/templateLoader.js" defer></script>
    <script src="/js/intext.js" defer></script>
    <script src="/js/menu.js" defer></script>
    <script src="/js/scroll-dots.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5HCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous" defer></script>
</body>
