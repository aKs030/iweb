<script>

document.addEventListener("DOMContentLoaded", () => {
  const sections = document.querySelectorAll("section");
  const scrollAnimateElements = document.querySelectorAll(".scroll-animate");
  const navItems = document.querySelectorAll(".nav-item");

  const observerTargets = new Set([...sections, ...scrollAnimateElements]);

  const observerCallback = (entries) => {
    entries.forEach(({ target, isIntersecting }) => {
      if (target.classList.contains("scroll-animate")) {
        const animationClass = target.dataset.animation || "animate__fadeInUp";

        if (isIntersecting) {
          target.classList.remove("animate__animated", animationClass); // Entferne vorhandene Klassen
          void target.offsetWidth; // Trigger a reflow to restart animation
          target.classList.add("animate__animated", animationClass, "visible");
        } else {
          target.classList.remove("visible");
        }
      }

      if (target.tagName.toLowerCase() === "section" && target.id) {
        if (isIntersecting) {
          const activeNavItem = document.querySelector(`.nav-item[data-section="${target.id}"]`);
          if (activeNavItem) {
            navItems.forEach((item) => item.classList.remove("active"));
            activeNavItem.classList.add("active");
          }
        }
      }
    });
  };

  const isMobile = window.matchMedia("(max-width: 768px)").matches;
  const observerOptions = isMobile
    ? { threshold: 0.3, rootMargin: "0px 0px -30px 0px" }
    : { threshold: 0.8, rootMargin: "0px 0px -50px 0px" };

  const observer = new IntersectionObserver(observerCallback, observerOptions);
  observerTargets.forEach((el) => observer.observe(el));

  



const navLinks = document.querySelectorAll(".nav-link");
navLinks.forEach((link) => {
  link.addEventListener("click", (e) => {
    e.preventDefault();
    const targetId = link.getAttribute("href").substring(1);
    const targetSection = document.getElementById(targetId);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: "smooth", block: "start" });
      window.scrollBy(0, -50); // Offset hinzufügen
      targetSection.setAttribute("tabindex", "-1");
      targetSection.focus();
      navItems.forEach((item) => item.classList.remove("active"));
      link.closest(".nav-item").classList.add("active");
    }});});

    const backToTopBtn = document.getElementById("back-to-top");
function toggleBackToTop() {
  backToTopBtn.classList.toggle("visible", window.scrollY > 500);}
backToTopBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });});
window.addEventListener("scroll", debounce(toggleBackToTop, 200));
function debounce(fn, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);};}


    function throttleRAF(callback) {
  let ticking = false;
  return function () {
    if (!ticking) {
      requestAnimationFrame(() => {
        callback();
        ticking = false;
      });
      ticking = true;
    }
  };
}

window.addEventListener(
  "scroll",
  throttleRAF(() => {
    backToTopBtn.classList.toggle("visible", window.scrollY > 500);
  }),
  { passive: true }
);




});
</script>
