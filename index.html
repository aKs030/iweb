<!doctype html>
<html lang="de" class="snap-page">
  <head>
    <!-- INJECT:GLOBAL-HEAD mode="base" -->
    <meta name="author" content="Abdulkerim Sesli" />
    <meta name="dateCreated" content="2025-12-31T12:00:00Z" />
    <!-- Route SEO metadata is injected server-side by middleware -->
    <link rel="me" href="https://github.com/aKs030" />
    <link rel="me" href="https://linkedin.com/in/abdulkerim-s" />
    <link rel="alternate" type="application/ld+json" href="/person.jsonld" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400..800&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- View Transitions API -->
    <meta name="view-transition" content="same-origin" />

    <!-- Icons and app metadata are injected by the global head template -->
  </head>
  <body>
    <a href="#main-content" class="skip-link sr-only">Zum Hauptinhalt springen</a>

    <div
      id="threeEarthContainer"
      class="three-earth-container"
      data-section="hero"
      aria-describedby="earth-description"
    >
      <div id="earth-description" class="sr-only">
        Eine interaktive 3D-Darstellung der Erde mit realistischen Texturen und Animationen.
        Verwenden Sie die Steuerungstasten zum Zoomen und Wechseln zwischen Kamera-Modi.
      </div>

      <div class="three-earth-error hidden">
        <div class="error-icon">🌍</div>
        <p>CSS-Modus</p>
      </div>
    </div>

    <div
      id="live-region-status"
      class="visually-hidden"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <div
      id="live-region-assertive"
      class="visually-hidden"
      aria-live="assertive"
      aria-atomic="true"
    ></div>

    <p class="typewriter-title typewriter-title--fixed">
      <span id="typedAuthor" class="typed-author"></span>
      <span id="typedText" class="typed-text"></span>
    </p>

    <div class="home-cosmos-bg" aria-hidden="true">
      <div class="home-aurora">
        <span class="home-aurora__plane home-aurora__plane--a"></span>
        <span class="home-aurora__plane home-aurora__plane--b"></span>
        <span class="home-aurora__plane home-aurora__plane--c"></span>
        <span class="home-aurora__plane home-aurora__plane--d"></span>
        <span class="home-aurora__plane home-aurora__plane--e"></span>
      </div>
      <div class="home-stars">
        <span class="home-star home-star--1"></span>
        <span class="home-star home-star--2"></span>
        <span class="home-star home-star--3"></span>
        <span class="home-star home-star--4"></span>
        <span class="home-star home-star--5"></span>
        <span class="home-star home-star--6"></span>
        <span class="home-star home-star--7"></span>
        <span class="home-star home-star--8"></span>
      </div>
      <span class="home-scanline"></span>
    </div>

    <main id="main-content" tabindex="-1">
      <section
        id="hero"
        class="section hero"
        aria-label="Willkommen im Portfolio — Startseite"
        data-section-src="/pages/home/hero"
        data-eager="true"
      ></section>

      <section
        id="features"
        class="section features full-screen-section"
        aria-label="Portfolio-Portale"
        data-i18n-attrs="aria-label:home.feature_portals_label"
        data-eager="true"
      >
        <nav
          class="features__fallback"
          aria-label="Portfolio-Portale"
          data-i18n-attrs="aria-label:home.feature_portals_label"
        >
          <h2 class="features__fallback-title" data-i18n="home.feature_portals_label">
            Portfolio-Portale
          </h2>
          <ul class="features__fallback-list">
            <li>
              <a href="/about/" data-i18n="home.feature_portal_profile">Profil</a>
            </li>
            <li>
              <a href="/projekte/" data-i18n="home.feature_portal_projects">Projekte</a>
            </li>
            <li>
              <a href="/gallery/" data-i18n="home.feature_portal_photos">Fotos</a>
            </li>
            <li>
              <a href="/videos/" data-i18n="home.feature_portal_videos">Videos</a>
            </li>
            <li>
              <a href="/blog/" data-i18n="home.feature_portal_journal">Journal</a>
            </li>
          </ul>
        </nav>
      </section>

      <section
        id="section3"
        class="section section3"
        aria-label="Portfolio-Notizen und weitere Wege"
        data-section-src="/pages/home/section3"
        data-eager="true"
      ></section>
    </main>
  </body>
</html>
