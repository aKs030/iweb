<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Portfolio von Abdulkerim Sesli - Webentwicklung, Fotografie und kreative digitale Projekte. Entdecke meine Arbeiten und lass uns zusammenarbeiten.">
  <meta name="keywords" content="Abdulkerim Sesli, Portfolio, Webentwicklung, Frontend, Fotografie, Berlin, Developer">
  <meta name="author" content="Abdulkerim Sesli">
  <meta property="og:title" content="Abdulkerim – Digital Portfolio">
  <meta property="og:description" content="Webentwicklung, Fotografie und kreative Projekte.">
  <meta property="og:type" content="website">

  <!-- Open Graph & PWA / Icons / Fonts etc... -->
  <link rel="icon" href="/content/img/icons/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/content/img/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="192x192" href="/content/img/icons/icon-192.png">
  <link rel="mask-icon" href="/content/img/icons/favicon.svg" color="#07a1ff">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&amp;display=swap">
  <link rel="stylesheet" href="/content/webentwicklung/root.css">
  <link rel="stylesheet" href="/content/webentwicklung/footer/footer.css">
    <link rel="stylesheet" href="/content/webentwicklung/index.css">
    <link rel="stylesheet" href="/content/webentwicklung/particles/particles.css">
    <link rel="stylesheet" href="/content/webentwicklung/menu/menu.css">
    <link rel="stylesheet" href="/pages/about/about.css">
    <title>Abdulkerim - Digital Portfolio</title>
</head>
<body>
  <!-- Menü (dynamisch geladen) -->
  <div id="menu-container"></div>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
  </div>

  <!-- Global Particle Background -->
  <div class="global-particle-background">
    <canvas class="particle-canvas" id="particleCanvas"></canvas>
    <div class="gradient-overlay"></div>
  </div>


  <!-- Global Hero Subtitle (jetzt außerhalb des dynamisch geladenen Hero-Inhalts) -->
  <p class="hero-subtitle hero-subtitle--fixed" data-offset-mode="full">
    <span id="typedAuthor" class="typed-author"></span>
    <span id="typedText" class="typed-text"></span>
  </p>

  <!-- Sections (dynamisch geladen via SectionLoader) -->
  <section
    id="hero"
    class="section hero"
    aria-labelledby="hero-heading"
    data-section-src="/pages/home/hero.html"
    data-eager="true"
    data-particle-color="rgba(9,139,255,0.8)"
    data-particle-opacity="0.5"
  >
    <div class="section-skeleton" aria-hidden="true"></div>
  </section>

  <!-- Card Section -->
<section
  id="features"
  class="section features"
  aria-labelledby="features-heading"
  data-features-src="/pages/card/karten.html"
  data-anim-in="500"
  data-anim-out="250"
  data-anim-ease="cubic-bezier(0.25,0.46,0.45,0.94)"
  data-live-label="Feature"
  data-particle-color="rgba(255,107,107,0.6)"
  data-particle-opacity="0.3"
  data-particle-gradient="radial"
  data-particle-alpha-scale="1.15"
>
  <!-- optional override für FeatureRotation -->
  <div class="section-skeleton" aria-hidden="true"></div>
</section>

  <!-- About Section -->
  <section
    id="about"
    class="section about"
    aria-labelledby="about-heading"
    data-section-src="/pages/about/about.html"
    data-particle-color="rgba(255,217,61,0.6)"
    data-particle-opacity="0.2"
  >
    <div class="section-skeleton" aria-hidden="true"></div>
  </section>


  <script src="/content/webentwicklung/utils/debug-config.js" defer></script>
  <script src="/content/webentwicklung/animations/animation.js" defer></script>
    <script type="module" src="/pages/card/karten-rotation.js"></script>
    <script type="module" src="/pages/home/hero.js"></script>
    <script type="module" src="/pages/about/about.js"></script>
    <!-- Main Script -->
    <script src="/content/webentwicklung/main.js" type="module"></script>
    <script type="module" src="/content/webentwicklung/menu/menu.js"></script>
  <!-- Dynamischer Footer-Container (lädt /content/webentwicklung/footer/footer.html) -->
  <div id="footer-container" data-footer-src="/content/webentwicklung/footer/footer.html"></div>
  <script src="/content/webentwicklung/footer/load-footer.js" defer></script>

</body>
</html>
