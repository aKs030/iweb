<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    #joystick-container button:active {
      background: #555;
    }
    #highscores {
      margin-top: 20px;
      text-align: left;
    }
    #highscores h3 {
      margin-bottom: 10px;
    }
    #highscores ul {
      list-style: none;
      padding: 0;
    }
    #highscores li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
    <button id="joystick-control">Joystick</button>
    <div id="highscores">
      <h3>Highscores</h3>
      <ul id="score-list"></ul>
    </div>
  </div>
  <div id="joystick-container" style="display: none;">
    <button data-dir="up">⬆</button>
    <div>
      <button data-dir="left">⬅</button>
      <button data-dir="right">➡</button>
    </div>
    <button data-dir="down">⬇</button>
  </div>

  <script type="module">
    // Firebase Setup
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.firebasestorage.app",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('game');
    const context = canvas.getContext('2d');

    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    async function saveScore(playerName, score) {
      try {
        await addDoc(collection(db, "scores"), {
          name: playerName,
          score: score,
          timestamp: new Date(),
        });
        console.log("Score gespeichert");
      } catch (error) {
        console.error("Fehler beim Speichern:", error);
      }
    }

    async function getTopScores() {
      const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(3));
      const querySnapshot = await getDocs(q);
      const scores = [];
      querySnapshot.forEach((doc) => {
        scores.push(doc.data());
      });
      return scores;
    }

    function displayScores(scores) {
      const scoreList = document.getElementById("score-list");
      scoreList.innerHTML = "";
      scores.forEach((score, index) => {
        const li = document.createElement("li");
        li.textContent = `${index + 1}. ${score.name}: ${score.score}`;
        scoreList.appendChild(li);
      });
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = 'red';
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = 'green';
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            alert(`Game Over! Score: ${score}`);
            saveScore(prompt("Name eingeben:"), score).then(() => {
              getTopScores().then(displayScores);
            });
            resetGame();
          }
        }
      });
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
    }

    function setupControls(type) {
      if (type === "keyboard") setupKeyboardControls();
      else if (type === "touch") setupTouchControls();
      else if (type === "joystick") setupJoystickControls();
    }

    function setupKeyboardControls() {
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.key === "ArrowUp" && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.key === "ArrowRight" && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.key === "ArrowDown" && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });
    }

    function setupTouchControls() {
      let touchStartX = 0, touchStartY = 0;

      canvas.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      });

      canvas.addEventListener("touchend", (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;

        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > 0 && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          } else if (diffX < 0 && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          }
        } else {
          if (diffY > 0 && snake.dy === 0) {
            snake.dy = grid;
            snake.dx = 0;
          } else if (diffY< 0 && snake.dy === 0) {
            snake.dy = -grid;
            snake.dx = 0;
          }
        }
      });
    }

    function setupJoystickControls() {
      const joystick = document.getElementById('joystick-container');
      joystick.style.display = 'block';

      joystick.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const direction = e.target.getAttribute('data-dir');
          if (direction === 'up' && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = -grid;
          } else if (direction === 'down' && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = grid;
          } else if (direction === 'left' && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          } else if (direction === 'right' && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          }
        });
      });
    }

    // Steuerungsauswahl
    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupControls("keyboard");
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("touch-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupControls("touch");
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("joystick-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupControls("joystick");
      requestAnimationFrame(gameLoop);
    });

    // Lade die Highscores beim Start
    getTopScores().then(displayScores);
  </script>
</body>
</html>
