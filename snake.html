<script type="module">
  import { gameLoop, resetGame } from "./game.js";
  import { saveScore, fetchScores } from "./firebase.js";
  import { setupKeyboardControls } from "./controls.js";

  const canvas = document.getElementById("game");
  const context = canvas.getContext("2d");

  function updateScore(score) {
    document.getElementById("score-board").textContent = `Punkte: ${score}`;
  }

  function gameOver(score) {
    const name = prompt("Gib deinen Namen ein:");
    if (name) saveScore(name, score);
  }

  setupKeyboardControls();
  fetchScores();
  requestAnimationFrame(() => gameLoop(context, updateScore, gameOver));
</script>
