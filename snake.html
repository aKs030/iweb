<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    #joystick-container button:active {
      background: #555;
    }
    #score {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 20px;
    }
    #score-list {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 16px;
      max-width: 200px;
      overflow-y: auto;
      max-height: 400px;
    }
    #score-list h3 {
      margin: 0;
      padding: 0;
      font-size: 18px;
    }
    #score-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #score-list li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="score">Score: 0</div>
  <div id="score-list">
    <h3>Top Scores</h3>
    <ul id="score-names">
      <!-- Scores will be dynamically populated here -->
    </ul>
  </div>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
    <button id="joystick-control">Joystick</button>
  </div>
  <div id="joystick-container" style="display: none;">
    <button data-dir="up">⬆</button>
    <div>
      <button data-dir="left">⬅</button>
      <button data-dir="right">➡</button>
    </div>
    <button data-dir="down">⬇</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.appspot.com",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('game');
    const context = canvas.getContext('2d');
    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = 'red';
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = 'green';
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score += 10;
          document.getElementById('score').innerText = `Score: ${score}`;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScore(prompt("Name eingeben:", "Unbekannt"), score);
            resetGame();
          }
        }
      });
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      document.getElementById('score').innerText = `Score: 0`;
    }

    async function saveScore(name, score) {
      try {
        await addDoc(collection(db, "scores"), { name, score, timestamp: new Date() });
        alert("Score gespeichert!");
      } catch (error) {
        console.error("Fehler beim Speichern des Scores:", error);
        alert("Fehler: Score konnte nicht gespeichert werden.");
      }
    }

    function loadScores() {
      const scoresRef = collection(db, "scores");
      const q = query(scoresRef, orderBy("score", "desc"), limit(10));

      onSnapshot(q, (snapshot) => {
        const scoreList = document.getElementById("score-names");
        scoreList.innerHTML = ""; // Clear the current list

        snapshot.forEach((doc) => {
          const { name, score } = doc.data();
          const li = document.createElement("li");
          li.textContent = `${name}: ${score}`;
          scoreList.appendChild(li);
        });
      });
    }

    function setupKeyboardControls() {
      document.addEventListener('keydown', (e) => {
        if (e.which === 37 && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.which === 38 && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.which === 39 && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.which === 40 && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });
    }

    function setupTouchControls() {
      let touchStartX = 0;
      let touchStartY = 0;

      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      });

      canvas.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;

        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > 0 && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          } else if (diffX < 0 && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          }
        } else {
          if (diffY > 0 && snake.dy === 0) {
            snake.dy = grid;
            snake.dx = 0;
          } else if (diffY < 0 && snake.dy === 0) {
            snake.dy = -grid;
            snake.dx = 0;
          }
        }
      });
    }

    function setupJoystickControls() {
      const joystick = document.getElementById('joystick-container');
      joystick.style.display = 'block';

      joystick.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          const direction = e.target.getAttribute('data-dir');

          if (direction === 'up' && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = -grid;
          } else if (direction === 'down' && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = grid;
          } else if (direction === 'left' && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          } else if (direction === 'right' && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          }
        });
      });
    }

    // Menü-Setup
    document.getElementById('keyboard-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      setupKeyboardControls();
      requestAnimationFrame(gameLoop);
    });

    document.getElementById('touch-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      setupTouchControls();
      requestAnimationFrame(gameLoop);
    });

    document.getElementById('joystick-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      setupJoystickControls();
      requestAnimationFrame(gameLoop);
    });

    // Lade die besten Scores beim Start
    loadScores();
  </script>
</body>
</html>
