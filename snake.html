<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    #joystick-container button:active {
      background: #555;
    }
    #live-score {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 20px;
      font-family: Arial, sans-serif;
    }
    #highscores {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 16px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
    <button id="joystick-control">Joystick</button>
    <h3>Highscores</h3>
    <ul id="score-list"></ul>
  </div>
  <div id="joystick-container" style="display: none;">
    <button data-dir="up">⬆</button>
    <div>
      <button data-dir="left">⬅</button>
      <button data-dir="right">➡</button>
    </div>
    <button data-dir="down">⬇</button>
  </div>
  <div id="live-score">Score: 0</div>
  <div id="highscores">
    <h4>Highscores</h4>
    <ul id="highscore-list"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function updateLiveScore() {
      document.getElementById("live-score").textContent = `Score: ${score}`;
    }

    function saveScoreToFirebase(score) {
      const name = prompt("Gib deinen Namen ein:", "Spieler");
      if (name) {
        const scoreRef = ref(database, "scores");
        push(scoreRef, { name, score });
      }
    }

    function loadHighScores() {
      const scoreRef = ref(database, "scores");
      onValue(scoreRef, (snapshot) => {
        const scores = [];
        snapshot.forEach((childSnapshot) => {
          scores.push(childSnapshot.val());
        });

        scores.sort((a, b) => b.score - a.score);
        const topScores = scores.slice(0, 3);

        const scoreList = document.getElementById("highscore-list");
        scoreList.innerHTML = "";
        topScores.forEach((entry) => {
          const li = document.createElement("li");
          li.textContent = `${entry.name}: ${entry.score}`;
          scoreList.appendChild(li);
        });
      });
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          updateLiveScore();

          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScoreToFirebase(score);
            snake.x = 160;
            snake.y = 160;
            snake.cells = [];
            snake.maxCells = 4;
            snake.dx = grid;
            snake.dy = 0;
            score = 0;
            updateLiveScore();

            apple.x = getRandomInt(0, 25) * grid;
            apple.y = getRandomInt(0, 25) * grid;
          }
        }
      });
    }

    function setupControls(type) {
      if (type === "keyboard") {
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowLeft" && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          } else if (e.key === "ArrowUp" && snake.dy === 0) {
            snake.dy = -grid;
            snake.dx = 0;
          } else if (e.key === "ArrowRight" && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          } else if (e.key === "ArrowDown" && snake.dy === 0) {
            snake.dy = grid;
            snake.dx = 0;
          }
        });
      } else if (type === "touchscreen") {
        canvas.addEventListener("touchstart", handleTouchStart, { passive: false });
        canvas.addEventListener("touchend", handleTouchEnd, { passive: false });
      }
    }

    loadHighScores();

    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupControls("keyboard");
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("touch-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupControls("touchscreen");
      requestAnimationFrame(gameLoop);
    });
  </script>
</body>
</html>
