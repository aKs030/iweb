<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game with Controls</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    canvas {
      border: 1px solid white;
    }

    .controls-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .controls-container button {
      padding: 10px 20px;
      margin: 0 10px;
      background-color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 5px;
    }

    .joystick-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: none;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }

    .joystick {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="controls-container">
    <button id="touchscreen-btn">Touchscreen Steuerung</button>
    <button id="joystick-btn">Joystick Steuerung</button>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="joystick-container" id="joystick-container">
    <div class="joystick" id="joystick"></div>
  </div>
  <script src="snake-game.js"></script>
</body>
</html>
