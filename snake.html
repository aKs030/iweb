<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game with Firebase</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    canvas {
      border: 1px solid white;
    }
    #menu, #scoreboard {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      border-radius: 5px;
    }
    #menu h2, #scoreboard h3 {
      margin: 0;
      font-size: 16px;
    }
    button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:active {
      background: #555;
    }
    #scoreboard ul {
      list-style: none;
      padding: 0;
      margin: 10px 0;
      font-size: 14px;
    }
    #scoreboard ul li {
      margin: 5px 0;
    }
    #current-score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.firebasestorage.app",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d",
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // Firebase references
    const scoresRef = ref(database, "scores");

    // Game variables
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const grid = 16;
    let count = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    let currentScore = 0;

    // Utility functions
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      currentScore = 0;
      updateScoreDisplay();
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    function updateScoreDisplay() {
      document.getElementById("current-score").innerText = `Score: ${currentScore}`;
    }

    function saveScore(name, score) {
      push(scoresRef, { name, score });
    }

    function displayScores() {
      const scoreList = document.getElementById("score-list");
      onValue(scoresRef, (snapshot) => {
        const scores = [];
        snapshot.forEach((childSnapshot) => {
          scores.push(childSnapshot.val());
        });
        scores.sort((a, b) => b.score - a.score); // Sort by score descending
        scoreList.innerHTML = scores
          .slice(0, 10)
          .map((s) => `<li>${s.name}: ${s.score}</li>`)
          .join("");
      });
    }

    // Game loop
    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          currentScore++;
          updateScoreDisplay();
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            const name = prompt("Game Over! Enter your name:");
            saveScore(name || "Anonymous", currentScore);
            resetGame();
          }
        }
      });
    }

    // Keyboard controls
    document.addEventListener("keydown", (e) => {
      if (e.which === 37 && snake.dx === 0) {
        snake.dx = -grid;
        snake.dy = 0;
      } else if (e.which === 38 && snake.dy === 0) {
        snake.dy = -grid;
        snake.dx = 0;
      } else if (e.which === 39 && snake.dx === 0) {
        snake.dx = grid;
        snake.dy = 0;
      } else if (e.which === 40 && snake.dy === 0) {
        snake.dy = grid;
        snake.dx = 0;
      }
    });

    resetGame();
    updateScoreDisplay();
    displayScores();
    requestAnimationFrame(gameLoop);
  </script>
</head>
<body>
  <div id="current-score">Score: 0</div>
  <div id="scoreboard">
    <h3>Top Scores</h3>
    <ul id="score-list"></ul>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
</body>
</html>
