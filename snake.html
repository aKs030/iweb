<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      width: 300px;
    }
    #score-list {
      margin-top: 20px;
      max-height: 150px;
      overflow-y: auto;
      text-align: left;
      font-size: 14px;
    }
    #score-list ul {
      list-style: none;
      padding: 0;
    }
    #score-list li {
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
    }
    .control-buttons {
      margin-top: 20px;
    }
    .control-buttons button {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #333;
      color: white;
    }
    .control-buttons button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <div id="score-list">
      <h3>Beste Scores</h3>
      <ul id="scores">
        <!-- Scores werden hier dynamisch geladen -->
      </ul>
    </div>
    <div class="control-buttons">
      <button id="keyboard-control">Tastatur</button>
      <button id="touch-control">Touchscreen</button>
      <button id="joystick-control">Joystick</button>
    </div>
  </div>

  <script type="module">
    // Firebase Setup
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.appspot.com",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Referenz für die Scores
    const scoresRef = collection(db, "scores");

    // Funktion, um Scores live anzuzeigen
    function loadScores() {
      const scoreQuery = query(scoresRef, orderBy("score", "desc"), limit(10));
      onSnapshot(scoreQuery, (snapshot) => {
        const scoresList = document.getElementById("scores");
        scoresList.innerHTML = ""; // Liste zurücksetzen
        snapshot.forEach((doc) => {
          const { name, score } = doc.data();
          const listItem = document.createElement("li");
          listItem.innerHTML = `<span>${name}</span><span>${score}</span>`;
          scoresList.appendChild(listItem);
        });
      });
    }

    // Spiel Setup
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");
    const grid = 16;
    let count = 0;
    let currentScore = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    // Zufällige Position für Apfel generieren
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    // Spielschleife
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      // Apfel zeichnen
      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      // Schlange zeichnen
      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          currentScore++;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        // Kollision
        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScore();
            resetGame();
          }
        }
      });
    }

    // Spiel zurücksetzen
    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      currentScore = 0;
    }

    // Score speichern
    async function saveScore() {
      const playerName = prompt("Dein Name:");
      if (playerName) {
        await addDoc(scoresRef, { name: playerName, score: currentScore });
      }
    }

    // Steuerungsfunktionen
    function setupKeyboardControls() {
      document.addEventListener("keydown", (e) => {
        if (e.which === 37 && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.which === 38 && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.which === 39 && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.which === 40 && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });
    }

    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupKeyboardControls();
      requestAnimationFrame(gameLoop);
    });

    // Scores laden
    loadScores();
  </script>
</body>
</html>
