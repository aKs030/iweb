<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game with Joystick</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      overflow: hidden;
    }
    canvas {
      border: 1px solid white;
      display: block;
    }
    .joystick-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }
    .joystick {
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="joystick-container">
    <div class="joystick" id="joystick"></div>
  </div>
  <script src="game-with-joystick.js"></script>
</body>
</html>
