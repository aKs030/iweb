<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
    }
    #joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    #joystick-container button:active {
      background: #555;
    }
    #scoreboard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 18px;
    }
    #highscores {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      font-size: 14px;
      max-width: 200px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
    <button id="joystick-control">Joystick</button>
  </div>
  <div id="joystick-container">
    <button data-dir="up">⬆</button>
    <div>
      <button data-dir="left">⬅</button>
      <button data-dir="right">➡</button>
    </div>
    <button data-dir="down">⬇</button>
  </div>
  <div id="scoreboard">Score: 0</div>
  <div id="highscores">
    <h3>Top Scores</h3>
    <ul id="score-list"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    // Firebase-Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      databaseURL: "https://snake-ed264-default-rtdb.firebaseio.com/",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.appspot.com",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    // Firebase initialisieren
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    // Zufällige Position für Apfel
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    // Spielschleife
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });
      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      // Apfel zeichnen
      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      // Schlange zeichnen
      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          document.getElementById("scoreboard").textContent = `Score: ${score}`;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScore(score);
            resetGame();
          }
        }
      });
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      document.getElementById("scoreboard").textContent = "Score: 0";
    }

    // Steuerung einrichten
    function setupKeyboardControls() {
      document.addEventListener("keydown", (e) => {
        if (e.which === 37 && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.which === 38 && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.which === 39 && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.which === 40 && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });
    }

    function setupTouchControls() {
      let touchStartX = 0;
      let touchStartY = 0;

      canvas.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      });

      canvas.addEventListener("touchend", (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > 0 && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          } else if (diffX < 0 && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          }
        } else {
          if (diffY > 0 && snake.dy === 0) {
            snake.dy = grid;
            snake.dx = 0;
          } else if (diffY < 0 && snake.dy === 0) {
            snake.dy = -grid;
            snake.dx = 0;
          }
        }
      });
    }

    function setupJoystickControls() {
      const joystick = document.getElementById("joystick-container");
      joystick.style.display = "flex";

      joystick.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          const direction = e.target.getAttribute("data-dir");

          if (direction === "up" && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = -grid;
          } else if (direction === "down" && snake.dy === 0) {
            snake.dx = 0;
            snake.dy = grid;
          } else if (direction === "left" && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          } else if (direction === "right" && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          }
        });
      });
    }

    // Score speichern
    function saveScore(score) {
      const name = prompt("Gib deinen Namen ein:", "Spieler");
      if (name) {
        const scoreRef = ref(database, "scores");
        push(scoreRef, { name, score });
      }
    }

    // Highscores abrufen und anzeigen
    function loadHighScores() {
      const scoreRef = ref(database, "scores");
      onValue(scoreRef, (snapshot) => {
        const scores = [];
        snapshot.forEach((childSnapshot) => {
          scores.push(childSnapshot.val());
        });

        // Sortiere die Scores und nehme die Top 3
        scores.sort((a, b) => b.score - a.score);
        const topScores = scores.slice(0, 3);

        // Highscores anzeigen
        const scoreList = document.getElementById("score-list");
        scoreList.innerHTML = "";
        topScores.forEach((entry) => {
          const li = document.createElement("li");
          li.textContent = `${entry.name}: ${entry.score}`;
          scoreList.appendChild(li);
        });
      });
    }

    // Steuerungs-Menü anzeigen
    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupKeyboardControls();
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("touch-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupTouchControls();
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("joystick-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupJoystickControls();
      requestAnimationFrame(gameLoop);
    });

    // Lade die Highscores beim Start
    loadHighScores();
  </script>
</body>
</html>
