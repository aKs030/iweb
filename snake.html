<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game with Firebase</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #live-score {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 20px;
    }
    #scoreboard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
  </div>
  <div id="live-score">Score: 0</div>
  <div id="scoreboard">Top Scores:</div>

  <script type="module">
    // Firebase-Konfiguration
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      databaseURL: "https://snake-ed264-default-rtdb.firebaseio.com",
      storageBucket: "snake-ed264.firebasestorage.app",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d",
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function updateLiveScore() {
      document.getElementById("live-score").textContent = `Score: ${score}`;
    }

    function saveScoreToFirebase(score) {
      const name = prompt("Gib deinen Namen ein:", "Spieler");
      if (name) {
        const scoreRef = ref(database, "scores");
        push(scoreRef, { name, score });
      }
    }

    function loadScores() {
      const scoreRef = ref(database, "scores");
      onValue(scoreRef, (snapshot) => {
        const scores = [];
        snapshot.forEach((childSnapshot) => {
          const data = childSnapshot.val();
          scores.push(data);
        });

        scores.sort((a, b) => b.score - a.score);
        const topScores = scores.slice(0, 3);

        const scoreboard = document.getElementById("scoreboard");
        scoreboard.innerHTML = "Top Scores:<br>" + topScores.map(s => `${s.name}: ${s.score}`).join("<br>");
      });
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;

      count = 0;
      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          updateLiveScore();

          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScoreToFirebase(score);
            snake.x = 160;
            snake.y = 160;
            snake.cells = [];
            snake.maxCells = 4;
            snake.dx = grid;
            snake.dy = 0;
            score = 0;
            updateLiveScore();

            apple.x = getRandomInt(0, 25) * grid;
            apple.y = getRandomInt(0, 25) * grid;
          }
        }
      });
    }

    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && snake.dx === 0) {
          snake.dx = -grid;
          snake.dy = 0;
        } else if (e.key === "ArrowUp" && snake.dy === 0) {
          snake.dy = -grid;
          snake.dx = 0;
        } else if (e.key === "ArrowRight" && snake.dx === 0) {
          snake.dx = grid;
          snake.dy = 0;
        } else if (e.key === "ArrowDown" && snake.dy === 0) {
          snake.dy = grid;
          snake.dx = 0;
        }
      });
      requestAnimationFrame(gameLoop);
    });

    document.getElementById("touch-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      let touchStartX = 0;
      let touchStartY = 0;

      canvas.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      });

      canvas.addEventListener("touchend", (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;

        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > 0 && snake.dx === 0) {
            snake.dx = grid;
            snake.dy = 0;
          } else if (diffX < 0 && snake.dx === 0) {
            snake.dx = -grid;
            snake.dy = 0;
          }
        } else {
          if (diffY > 0 && snake.dy === 0) {
            snake.dy = grid;
            snake.dx = 0;
          } else if (diffY < 0 && snake.dy === 0) {
            snake.dy = -grid;
            snake.dx = 0;
          }
        }
      });
      requestAnimationFrame(gameLoop);
    });

    loadScores();
  </script>
</body>
</html>
