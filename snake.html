<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #touch-controls, #joystick-container {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:active {
      background: #555;
    }
    #score {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 20px;
    }
    #leaderboard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <h2>Wähle eine Steuerung</h2>
    <button id="keyboard-control">Tastatur</button>
    <button id="touch-control">Touchscreen</button>
    <button id="joystick-control">Joystick</button>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="touch-controls">
    <button id="touch-up">⬆</button>
    <div>
      <button id="touch-left">⬅</button>
      <button id="touch-right">➡</button>
    </div>
    <button id="touch-down">⬇</button>
  </div>
  <div id="joystick-container">
    <button data-dir="up">⬆</button>
    <div>
      <button data-dir="left">⬅</button>
      <button data-dir="right">➡</button>
    </div>
    <button data-dir="down">⬇</button>
  </div>
  <div id="score">Score: 0</div>
  <div id="leaderboard">
    <h3>Top Scores</h3>
    <ul id="scores-list"></ul>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.firebasestorage.app",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('game');
    const context = canvas.getContext('2d');
    const grid = 16;
    let count = 0, score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4
    };

    const apple = { x: 320, y: 320 };

    const scoreElement = document.getElementById('score');
    const leaderboardElement = document.getElementById('scores-list');

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min)) + min;
    }

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      updateScore();
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    function updateScore() {
      scoreElement.textContent = `Score: ${score}`;
    }

    function saveScore(playerName) {
      const scoresRef = ref(db, 'scores/');
      push(scoresRef, { playerName, score });
    }

    function displayLeaderboard() {
      const scoresRef = ref(db, 'scores/');
      onValue(scoresRef, snapshot => {
        const scores = snapshot.val();
        leaderboardElement.innerHTML = '';
        Object.values(scores || {})
          .sort((a, b) => b.score - a.score)
          .slice(0, 3)
          .forEach((entry, index) => {
            leaderboardElement.innerHTML += `<li>${index + 1}. ${entry.playerName}: ${entry.score}</li>`;
          });
      });
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);
      if (++count < 4) return;
      count = 0;

      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;
      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });
      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = 'red';
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = 'green';
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          updateScore();
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            saveScore(prompt("Name eingeben:"));
            resetGame();
          }
        }
      });
    }

    document.getElementById('keyboard-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      document.addEventListener('keydown', e => {
        if (e.which === 37 && snake.dx === 0) snake.dx = -grid, snake.dy = 0;
        if (e.which === 38 && snake.dy === 0) snake.dy = -grid, snake.dx = 0;
        if (e.which === 39 && snake.dx === 0) snake.dx = grid, snake.dy = 0;
        if (e.which === 40 && snake.dy === 0) snake.dy = grid, snake.dx = 0;
      });
      requestAnimationFrame(gameLoop);
    });

    document.getElementById('touch-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('touch-controls').style.display = 'flex';
      ['up', 'down', 'left', 'right'].forEach(dir => {
        document.getElementById(`touch-${dir}`).addEventListener('click', () => {
          if (dir === 'up' && snake.dy === 0) snake.dy = -grid, snake.dx = 0;
          if (dir === 'down' && snake.dy === 0) snake.dy = grid, snake.dx = 0;
          if (dir === 'left' && snake.dx === 0) snake.dx = -grid, snake.dy = 0;
          if (dir === 'right' && snake.dx === 0) snake.dx = grid, snake.dy = 0;
        });
      });
      requestAnimationFrame(gameLoop);
    });

    document.getElementById('joystick-control').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('joystick-container').style.display = 'flex';
      document.querySelectorAll('[data-dir]').forEach(button => {
        button.addEventListener('click', () => {
          const dir = button.getAttribute('data-dir');
          if (dir === 'up' && snake.dy === 0) snake.dy = -grid, snake.dx = 0;
          if (dir === 'down' && snake.dy === 0) snake.dy = grid, snake.dx = 0;
          if (dir === 'left' && snake.dx === 0) snake.dx = -grid, snake.dy = 0;
          if (dir === 'right' && snake.dx === 0) snake.dx = grid, snake.dy = 0;
        });
      });
      requestAnimationFrame(gameLoop);
    });

    // Display the leaderboard
    displayLeaderboard();

    // Reset game at the start
    resetGame();
  </script>
</body>
</html>
