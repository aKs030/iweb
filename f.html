<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrolling Text Animation</title>
    <style>
        body {
            margin: 0;
            height: 300vh; /* Extend height for scrolling */
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            color: white;
            overflow-x: hidden;
        }

        .annimationW {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            text-align: center;
            max-width: 90%;
            gap: 10px;
        }

        .letter {
            font-size: 2.2vw;
            margin: 0 5px;
            transform: translateY(0) scale(1);
            opacity: 1;
            transition: transform 0.6s ease, opacity 0.6s ease;
        }

        .hidden {
            transform: translateY(-50px) scale(0.8);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="animationW" id="text-container">
        <span class="letter">Ich freue mich, dass du den Weg hierher gefunden hast.</span>
        <span class="letter">Diese Seite dient als mein digitales Zuhause im.</span>
        <span class="letter">World Wide Web auf der ich meine Interessen, Erfahrungen</span>
        <span class="letter">und Gedanken teilen möchte.</span>
        <span class="letter"></span>
        <span class="letter">Lass mich dir einen kleinen Einblick geben,</span>
        <span class="letter">was dich hier erwartet.</span>
    </div>

    <script>
        const letters = document.querySelectorAll('.letter');

        // Show letters initially
        letters.forEach(letter => {
            letter.classList.remove('hidden');
        });

        window.addEventListener('scroll', () => {
            const scrollPosition = window.scrollY;
            const triggerPoint = window.innerHeight * 0.5;

            letters.forEach((letter, index) => {
                const offset = index * 50; // Staggered hiding animation
                if (scrollPosition > triggerPoint + offset) {
                    letter.classList.add('hidden');
                } else {
                    letter.classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
