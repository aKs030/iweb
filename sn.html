<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Snake Spiel</title>
  <link rel="stylesheet" href="css/custom.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .menu-container, .footer-container {
      width: 100%;
    }
    .game-container {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }
    .joystick-container {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    .joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 5px;
      cursor: pointer;
    }
    .joystick-container button:active {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="menu-container"></div>

  <div class="game-container">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="menu">
      <h2>Wähle eine Steuerung</h2>
      <button id="keyboard-control">Tastatur</button>
      <button id="touch-control">Touchscreen</button>
      <button id="joystick-control">Joystick</button>
      <h3>Highscores</h3>
      <ul id="score-list">Lade Scores...</ul>
    </div>
  </div>

  <div class="footer-container"></div>

</body>
</html>
