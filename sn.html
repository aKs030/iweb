<!doctype html>
<html lang="de">

<head>
  <title>Snake Spiel</title>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700' rel='stylesheet' type='text/css'>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>
  <script src="f.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    #game-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }
    canvas {
      border: 1px solid white;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    #joystick-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      display: none;
    }
    #joystick-container button {
      background: #333;
      color: white;
      border: none;
      padding: 10px;
      margin: 5px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    #joystick-container button:active {
      background: #555;
    }
    #highscores {
      margin-top: 20px;
      text-align: left;
    }
    #highscores ul {
      list-style: none;
      padding: 0;
    }
    #highscores li {
      margin: 5px 0;
    }
    #score-board {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="menu-container"></div>

  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="menu">
      <h2>Wähle eine Steuerung</h2>
      <button id="keyboard-control">Tastatur</button>
      <button id="touch-control">Touchscreen</button>
      <button id="joystick-control">Joystick</button>
      <div id="highscores">
        <h3>Highscores</h3>
        <ul id="score-list">Lade Scores...</ul>
      </div>
    </div>
    <div id="joystick-container">
      <button data-dir="up">⬆</button>
      <div>
        <button data-dir="left">⬅</button>
        <button data-dir="right">➡</button>
      </div>
      <button data-dir="down">⬇</button>
    </div>
    <div id="score-board">Punkte: 0</div>
  </div>

  <div class="footer-container"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdkQKbKU854FSaXIttjg30xh4DVGdj-Es",
      authDomain: "snake-ed264.firebaseapp.com",
      projectId: "snake-ed264",
      storageBucket: "snake-ed264.firebasestorage.app",
      messagingSenderId: "95766919512",
      appId: "1:95766919512:web:78498968a8383721cecd2d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const canvas = document.getElementById('game');
    const context = canvas.getContext('2d');
    const grid = 16;
    let count = 0;
    let score = 0;

    const snake = {
      x: 160,
      y: 160,
      dx: grid,
      dy: 0,
      cells: [],
      maxCells: 4,
    };

    const apple = {
      x: 320,
      y: 320,
    };

    // Lade Highscores
    async function fetchScores() {
      const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(3));
      const querySnapshot = await getDocs(q);
      const scoresList = document.getElementById("score-list");
      scoresList.innerHTML = "";

      querySnapshot.forEach(doc => {
        const li = document.createElement("li");
        li.textContent = `${doc.data().name}: ${doc.data().score}`;
        scoresList.appendChild(li);
      });
    }

    function setupKeyboardControls() {
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && snake.dx === 0) snake.dx = -grid;
        if (e.key === "ArrowUp" && snake.dy === 0) snake.dy = -grid;
        if (e.key === "ArrowRight" && snake.dx === 0) snake.dx = grid;
        if (e.key === "ArrowDown" && snake.dy === 0) snake.dy = grid;
      });
    }

    function setupTouchControls() {
      let touchStartX, touchStartY;
      canvas.addEventListener("touchstart", (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      });

      canvas.addEventListener("touchend", (e) => {
        const diffX = e.changedTouches[0].clientX - touchStartX;
        const diffY = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > 0 && snake.dx === 0) snake.dx = grid;
          if (diffX < 0 && snake.dx === 0) snake.dx = -grid;
        } else {
          if (diffY > 0 && snake.dy === 0) snake.dy = grid;
          if (diffY < 0 && snake.dy === 0) snake.dy = -grid;
        }
      });
    }

    // Steuerungsauswahl
    document.getElementById("keyboard-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupKeyboardControls();
      requestAnimationFrame(() => gameLoop());
    });

    document.getElementById("touch-control").addEventListener("click", () => {
      document.getElementById("menu").style.display = "none";
      setupTouchControls();
      requestAnimationFrame(() => gameLoop());
    });

    fetchScores();
  </script>
</body>

</html>
