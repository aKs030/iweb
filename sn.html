<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Spiel</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" rel="stylesheet">

  <style>
    /* Grundlegendes Layout */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100vh;
      background-color: #333;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
    }

    .banner {
      text-align: center;
      padding: 20px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #1e90ff, #104e8b);
      color: #fff;
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .banner h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .banner p {
      margin: 5px 0 0;
      font-size: 1.2rem;
    }

    .main-content {
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 500px;
    }

    canvas {
      border: 2px solid #fff;
      margin-bottom: 20px;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #1e90ff;
      color: #fff;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #104e8b;
    }

    #highscores {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      width: 100%;
    }

    #score-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 16px;
      color: #fff;
    }

    #score-board {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Banner -->
  <div class="banner">
    <h1>Willkommen beim Snake Spiel</h1>
    <p>Teste deine Reflexe und schlage den Highscore!</p>
  </div>

  <!-- Hauptinhalt -->
  <div class="main-content">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="menu">
      <h2>Wähle eine Steuerung</h2>
      <button id="keyboard-control">Tastatur</button>
      <button id="touch-control">Touchscreen</button>
      <button id="joystick-control">Joystick</button>
    </div>
    <div id="highscores">
      <h3>Highscores</h3>
      <ul id="score-list">Lade Scores...</ul>
    </div>
    <div id="score-board">Punkte: 0</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");
    const grid = 16;
    let count = 0, score = 0;

    const snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
    const apple = { x: 320, y: 320 };

    const menu = document.getElementById("menu");
    const scoreBoard = document.getElementById("score-board");
    const highScoresList = document.getElementById("score-list");

    function resetGame() {
      snake.x = 160;
      snake.y = 160;
      snake.cells = [];
      snake.maxCells = 4;
      snake.dx = grid;
      snake.dy = 0;
      score = 0;
      scoreBoard.textContent = `Punkte: ${score}`;
    }

    function gameLoop() {
      requestAnimationFrame(gameLoop);

      if (++count < 4) return;
      count = 0;

      context.clearRect(0, 0, canvas.width, canvas.height);

      snake.x += snake.dx;
      snake.y += snake.dy;

      if (snake.x < 0) snake.x = canvas.width - grid;
      else if (snake.x >= canvas.width) snake.x = 0;

      if (snake.y < 0) snake.y = canvas.height - grid;
      else if (snake.y >= canvas.height) snake.y = 0;

      snake.cells.unshift({ x: snake.x, y: snake.y });

      if (snake.cells.length > snake.maxCells) snake.cells.pop();

      context.fillStyle = "red";
      context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

      context.fillStyle = "green";
      snake.cells.forEach((cell, index) => {
        context.fillRect(cell.x, cell.y, grid - 1, grid - 1);

        if (cell.x === apple.x && cell.y === apple.y) {
          snake.maxCells++;
          score++;
          scoreBoard.textContent = `Punkte: ${score}`;
          apple.x = Math.floor(Math.random() * 25) * grid;
          apple.y = Math.floor(Math.random() * 25) * grid;
        }

        for (let i = index + 1; i < snake.cells.length; i++) {
          if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
            alert("Game Over!");
            resetGame();
          }
        }
      });
    }

    document.getElementById("keyboard-control").addEventListener("click", () => {
      menu.style.display = "none";
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        if (e.key === "ArrowUp" && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        if (e.key === "ArrowRight" && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
        if (e.key === "ArrowDown" && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
      });
      requestAnimationFrame(gameLoop);
    });

    function fetchHighScores() {
      highScoresList.innerHTML = "<li>Max: 10</li><li>Anna: 8</li><li>Tom: 6</li>";
    }

    fetchHighScores();
  </script>
</body>
</html>
