<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Dashboard - iweb-7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .dashboard-header {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .dashboard-content {
            padding: 30px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #4ECDC4;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        .metric-card.warning {
            border-left-color: #FFE66D;
        }
        
        .metric-card.error {
            border-left-color: #FF6B6B;
        }
        
        .metric-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .metric-value.good { color: #4ECDC4; }
        .metric-value.warning { color: #FFE66D; }
        .metric-value.poor { color: #FF6B6B; }
        
        .metric-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-indicator.good { background-color: #4ECDC4; }
        .status-indicator.warning { background-color: #FFE66D; }
        .status-indicator.poor { background-color: #FF6B6B; }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #4ECDC4, #44A08D);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #FFE66D, #FF8A00);
            color: #333;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        .real-time-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .real-time-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .log-container {
            background: #1a1a1a;
            color: #00ff00;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            height: 300px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .log-entry {
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .log-entry.error { color: #ff4444; }
        .log-entry.warning { color: #ffaa00; }
        .log-entry.info { color: #4444ff; }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .dashboard-header h1 {
                font-size: 2rem;
            }
            
            .dashboard-content {
                padding: 20px;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-header">
            <h1>🚀 Performance Dashboard</h1>
            <p>Echtzeit-Monitoring für iweb-7 Website</p>
        </div>
        
        <div class="dashboard-content">
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshMetrics()">
                    📊 Metriken aktualisieren
                </button>
                <button class="btn btn-secondary" onclick="exportData()">
                    💾 Daten exportieren
                </button>
                <button class="btn btn-warning" onclick="clearLogs()">
                    🗑️ Logs löschen
                </button>
                <a href="index.html" class="btn btn-secondary">
                    🏠 Zur Website
                </a>
            </div>
            
            <div class="metrics-grid" id="metricsGrid">
                <!-- Metrics will be populated by JavaScript -->
            </div>
            
            <div class="real-time-section">
                <div class="real-time-title">
                    📡 Echtzeit-Monitoring
                    <span class="status-indicator good" id="connectionStatus"></span>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">Performance Dashboard gestartet...</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>iweb-7 Performance Dashboard © 2025 | Optimiert für maximale Performance</p>
        </div>
    </div>

    <!-- Lade die Monitoring-Systeme für das Dashboard -->
    <script src="js/enhanced-error-handler.js"></script>
    <script src="js/performance-monitor-enhanced.js"></script>
    
    <script>
        class PerformanceDashboard {
            constructor() {
                this.logContainer = document.getElementById('logContainer');
                this.metricsGrid = document.getElementById('metricsGrid');
                this.connectionStatus = document.getElementById('connectionStatus');
                
                this.isMonitoring = false;
                this.metrics = new Map();
                this.alerts = [];
                
                this.initializeEventListeners();
                this.startMonitoring();
                
                this.log('Dashboard initialisiert', 'info');
            }
            
            initializeEventListeners() {
                // Listen for performance alerts from the main monitoring system
                document.addEventListener('performanceAlert', (event) => {
                    this.handlePerformanceAlert(event.detail);
                });
                
                // Listen for error events
                document.addEventListener('promiseError', (event) => {
                    this.handleErrorEvent(event.detail);
                });
                
                // Auto-refresh every 10 seconds
                setInterval(() => {
                    this.refreshMetrics();
                }, 10000);
            }
            
            startMonitoring() {
                this.isMonitoring = true;
                this.connectionStatus.className = 'status-indicator good';
                this.log('Monitoring gestartet', 'info');
                
                // Initial metrics load
                setTimeout(() => {
                    this.refreshMetrics();
                }, 1000);
            }
            
            refreshMetrics() {
                if (window.websitePerformanceMonitor) {
                    const summary = window.websitePerformanceMonitor.getPerformanceSummary();
                    this.updateMetricsDisplay(summary);
                    this.log('Metriken aktualisiert', 'info');
                } else {
                    this.log('Performance Monitor nicht verfügbar', 'warning');
                }
                
                if (window.websiteErrorHandler) {
                    const errorStats = window.websiteErrorHandler.getErrorStats();
                    this.updateErrorStats(errorStats);
                }
            }
            
            updateMetricsDisplay(summary) {
                const metrics = [];
                
                // Core Web Vitals
                Object.entries(summary.coreWebVitals).forEach(([name, data]) => {
                    metrics.push({
                        title: this.getMetricTitle(name),
                        value: this.formatMetricValue(name, data.value),
                        rating: data.rating,
                        description: this.getMetricDescription(name)
                    });
                });
                
                // Custom Metrics
                Object.entries(summary.customMetrics).forEach(([name, data]) => {
                    metrics.push({
                        title: this.getMetricTitle(name),
                        value: this.formatMetricValue(name, data.value),
                        rating: data.rating,
                        description: this.getMetricDescription(name)
                    });
                });
                
                // Browser Info
                if ('connection' in navigator) {
                    const conn = navigator.connection;
                    metrics.push({
                        title: '🌐 Netzwerk',
                        value: conn.effectiveType || 'unknown',
                        rating: conn.effectiveType === '4g' ? 'good' : 'warning',
                        description: `Downlink: ${conn.downlink}Mbps, RTT: ${conn.rtt}ms`
                    });
                }
                
                // Memory Info
                if ('memory' in performance) {
                    const memory = performance.memory;
                    const usagePercent = Math.round((memory.usedJSHeapSize / memory.jsHeapSizeLimit) * 100);
                    
                    let memoryRating;
                    if (usagePercent < 50) {
                        memoryRating = 'good';
                    } else if (usagePercent < 80) {
                        memoryRating = 'warning';
                    } else {
                        memoryRating = 'poor';
                    }
                    
                    metrics.push({
                        title: '🧠 Speicher',
                        value: `${usagePercent}%`,
                        rating: memoryRating,
                        description: `${this.formatBytes(memory.usedJSHeapSize)} / ${this.formatBytes(memory.jsHeapSizeLimit)}`
                    });
                }
                
                this.renderMetrics(metrics);
            }
            
            updateErrorStats(errorStats) {
                if (errorStats.total > 0) {
                    const errorMetric = {
                        title: '⚠️ Fehler',
                        value: errorStats.total.toString(),
                        rating: errorStats.total < 5 ? 'warning' : 'poor',
                        description: `Letzte 5 Min: ${errorStats.recent.length}`
                    };
                    
                    // Add error metric to display
                    this.addMetricToGrid(errorMetric);
                }
            }
            
            renderMetrics(metrics) {
                this.metricsGrid.innerHTML = '';
                metrics.forEach(metric => {
                    this.addMetricToGrid(metric);
                });
            }
            
            addMetricToGrid(metric) {
                const card = document.createElement('div');
                card.className = `metric-card ${metric.rating}`;
                
                card.innerHTML = `
                    <div class="metric-title">
                        <span class="status-indicator ${metric.rating}"></span>
                        ${metric.title}
                    </div>
                    <div class="metric-value ${metric.rating}">${metric.value}</div>
                    <div class="metric-description">${metric.description}</div>
                `;
                
                this.metricsGrid.appendChild(card);
            }
            
            getMetricTitle(name) {
                const titles = {
                    'LCP': '🎨 Largest Contentful Paint',
                    'FID': '⚡ First Input Delay',
                    'CLS': '📐 Cumulative Layout Shift',
                    'templateLoad': '📄 Template Loading',
                    'animationDuration': '🎬 Animation Duration',
                    'memoryUsage': '🧠 Memory Usage',
                    'scrollFPS': '📜 Scroll FPS'
                };
                return titles[name] || name;
            }
            
            formatMetricValue(name, value) {
                if (name === 'CLS') {
                    return value.toFixed(3);
                } else if (name === 'memoryUsage') {
                    return `${Math.round(value * 100)}%`;
                } else if (name === 'scrollFPS') {
                    return `${Math.round(value)} fps`;
                } else if (typeof value === 'number') {
                    return `${Math.round(value)}ms`;
                }
                return value.toString();
            }
            
            getMetricDescription(name) {
                const descriptions = {
                    'LCP': 'Zeit bis zum größten Content-Element',
                    'FID': 'Verzögerung bei der ersten Interaktion',
                    'CLS': 'Unerwartete Layout-Verschiebungen',
                    'templateLoad': 'Zeit zum Laden der Templates',
                    'animationDuration': 'Dauer der Scroll-Animationen',
                    'memoryUsage': 'JavaScript Heap Speicherverbrauch',
                    'scrollFPS': 'Frames pro Sekunde beim Scrollen'
                };
                return descriptions[name] || 'Performance-Metrik';
            }
            
            formatBytes(bytes) {
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                if (bytes === 0) return '0 Bytes';
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
            }
            
            handlePerformanceAlert(alertData) {
                const alertMessage = `Performance Alert: ${alertData.type} - ${JSON.stringify(alertData.data)}`;
                this.log(alertMessage, 'warning');
                this.alerts.push({
                    ...alertData,
                    timestamp: Date.now()
                });
            }
            
            handleErrorEvent(errorData) {
                const errorMessage = `Error: ${errorData.message}`;
                this.log(errorMessage, 'error');
            }
            
            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${type}`;
                logEntry.textContent = `[${timestamp}] ${message}`;
                
                this.logContainer.appendChild(logEntry);
                this.logContainer.scrollTop = this.logContainer.scrollHeight;
                
                // Keep only last 100 log entries
                const entries = this.logContainer.querySelectorAll('.log-entry');
                if (entries.length > 100) {
                    entries[0].remove();
                }
            }
            
            exportData() {
                const data = {
                    timestamp: new Date().toISOString(),
                    metrics: window.websitePerformanceMonitor ? 
                        Object.fromEntries(window.websitePerformanceMonitor.metrics) : {},
                    errors: window.websiteErrorHandler ? 
                        window.websiteErrorHandler.errors : [],
                    alerts: this.alerts,
                    browser: {
                        userAgent: navigator.userAgent,
                        connection: navigator.connection ? {
                            effectiveType: navigator.connection.effectiveType,
                            downlink: navigator.connection.downlink,
                            rtt: navigator.connection.rtt
                        } : null,
                        memory: performance.memory ? {
                            used: performance.memory.usedJSHeapSize,
                            total: performance.memory.totalJSHeapSize,
                            limit: performance.memory.jsHeapSizeLimit
                        } : null
                    }
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], {
                    type: 'application/json'
                });
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `performance-report-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                this.log('Performance-Daten exportiert', 'info');
            }
            
            clearLogs() {
                this.logContainer.innerHTML = '<div class="log-entry">Logs gelöscht...</div>';
                this.log('Dashboard bereit', 'info');
            }
        }
        
        // Global functions for buttons
        function refreshMetrics() {
            if (window.performanceDashboard) {
                window.performanceDashboard.refreshMetrics();
            }
        }
        
        function exportData() {
            if (window.performanceDashboard) {
                window.performanceDashboard.exportData();
            }
        }
        
        function clearLogs() {
            if (window.performanceDashboard) {
                window.performanceDashboard.clearLogs();
            }
        }
        
        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.performanceDashboard = new PerformanceDashboard();
        });
        
        // Simulate some test data if monitoring systems aren't available
        if (!window.websitePerformanceMonitor && !window.websiteErrorHandler) {
            setTimeout(() => {
                if (window.performanceDashboard) {
                    window.performanceDashboard.log('Simulation: LCP gemessen - 1.2s', 'info');
                    window.performanceDashboard.log('Simulation: Animation completed - 850ms', 'info');
                    window.performanceDashboard.log('Simulation: Template loading - 320ms', 'info');
                }
            }, 2000);
        }
    </script>
</body>
</html>
