<div class="section hero" id="hero">
  <div class="container hero-content">
    <div class="hero-visual">
      <!-- Dein visueller Inhalt hier -->
      <div class="hero-image-container">
         <div class="spotlight-bg"></div>
      </div>
    </div>
    <h1 id="hero-heading" class="visually-hidden">Abdulkerim Sesli – Webentwicklung &amp; kreative digitale Projekte</h1>
  </div>

  <!-- Button-Container ist jetzt ein direkter Flex-Child der Hero-Sektion -->
  <div class="hero-buttons">
     <a href="#projects" class="btn btn-primary btn-crt">Projekte entdecken</a>
     <a href="/content/kontakt/" class="btn btn-secondary btn-crt">Kontakt</a>

<!-- JavaScript, um die Animation zu triggern (Beispiel) -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const animatedElements = document.querySelectorAll('.btn-crt');
  // Simuliert das Sichtbarwerden der Elemente, z.B. durch Scrollen
  setTimeout(() => {
    animatedElements.forEach(el => el.classList.add('is-visible'));
  }, 500);
});
</script>
