<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogalerie</title>

    <meta
      name="description"
      content="Entdecken Sie eine interaktive Fotogalerie mit atemberaubenden Momentaufnahmen und intuitiver Navigation."
    />
    <meta
      name="keywords"
      content="Fotogalerie, Fotos, Bilder, interaktiv, Fotografie, professionell, Kunst, Abdo, Slider, Karussell"
    />
    <meta name="author" content="Abdo" />
    <meta name="robots" content="index, follow" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/css/album.css" />
    <link rel="preload" as="image" href="/assets/img/Album/cS-1.jpg" />

    <script src="/assets/js/menu.js" defer></script>
    <script src="/assets/js/cookie-system.js" defer></script>
  </head>

  <body>
    <header id="menu-container" role="banner" aria-label="Hauptnavigation"></header>

    <main id="main-content">
      <section class="gallery-section" aria-labelledby="gallery-heading">
        <div class="container">
          <h6 id="gallery-heading">Meine Fotografische Reise</h6>
          <p class="lead-text">
            Tauchen Sie ein in meine Bildwelten und entdecken Sie ausgewählte Werke in voller Pracht.
          </p>
          <div class="hero-image-display">
            <div class="gallery-title-above-image">
              <h3 id="image-title">Über den Wolken</h3>
            </div>
            <img
              id="main-gallery-image"
              src="/assets/img/Album/cS-1.jpg"
              srcset="/img/Album/cS-1.jpg 800w"
              sizes="(max-width: 600px) 100vw, 50vw"
              alt="Hauptbild der Galerie: Luftaufnahme einer dichten, welligen Wolkendecke von oben, die an eine Berglandschaft erinnert, mit klarem blauem Himmel darüber."
              loading="lazy"
            />
            <button class="gallery-nav-button prev-button" aria-label="Vorheriges Bild anzeigen">&#10094;</button>
            <button class="gallery-nav-button next-button" aria-label="Nächstes Bild anzeigen">&#10095;</button>
            <div class="gallery-description-below-image">
              <p id="image-detail">
                Ein majestätischer Blick auf die endlose Weite und die friedliche Stille über dem Horizont.
              </p>
            </div>
          </div>
        </div>

        <div class="thumbnails-container">
          <div class="thumbnails-grid">
            <div class="thumbnail-item active" data-index="0">
              <img src="/assets/img/Album/cS-1.jpg" alt="Vorschaubild: Luftaufnahme Wolkendecke" loading="lazy" />
            </div>
            <div class="thumbnail-item" data-index="1">
              <img src="/assets/img/Album/cS-2.jpg" alt="Vorschaubild: Stadtbrücke bei Nacht" loading="lazy" />
            </div>
            <div class="thumbnail-item" data-index="2">
              <img src="/assets/img/Album/cS-3.jpg" alt="Vorschaubild: Küstenlandschaft mit Felsen" loading="lazy" />
            </div>
            <div class="thumbnail-item" data-index="3">
              <img src="/assets/img/Album/cS-4.jpg" alt="Vorschaubild: Ruinen unter bewölktem Himmel" loading="lazy" />
            </div>
            <div class="thumbnail-item" data-index="4">
              <img src="/assets/img/Album/cS-5.jpg" alt="Vorschaubild: Antike Ruinen in Landschaft" loading="lazy" />
            </div>
            <div class="thumbnail-item" data-index="5">
              <img src="/assets/img/Album/cS-6.jpg" alt="Vorschaubild: Inneres einer Moschee" loading="lazy" />
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
      const mainImage = document.getElementById('main-gallery-image');
      const imageTitle = document.getElementById('image-title');
      const imageDetail = document.getElementById('image-detail');
      const thumbnails = document.querySelectorAll('.thumbnail-item');
      const prevButton = document.querySelector('.prev-button');
      const nextButton = document.querySelector('.next-button');

      const galleryData = [
        {
          src: '/img/Album/cS-1.jpg',
          alt: 'Luftaufnahme einer dichten, welligen Wolkendecke von oben, die an eine Berglandschaft erinnert, mit klarem blauem Himmel darüber.',
          title: 'Himmel über den Wolken',
          detail: 'Ein majestätischer Blick auf die endlose Weite und die friedliche Stille über dem Horizont.',
        },
        {
          src: '/img/Album/cS-2.jpg',
          alt: 'Nachtaufnahme einer beleuchteten Stadtbrücke, deren Lichter sich spektakulär im dunklen Wasser darunter spiegeln.',
          title: 'Stadtlichter bei Nacht',
          detail: 'Magische Momente, wenn die Stadt erwacht und in leuchtenden Farben glänzt.',
        },
        {
          src: '/img/Album/cS-3.jpg',
          alt: 'Dramatische Küstenlandschaft mit einem majestätischen Felsen im dunkelblauen Meer und sanften, grünen Hügeln im Hintergrund unter bewölktem Himmel.',
          title: 'Küstenzauber',
          detail: 'Die Ruhe und ursprüngliche Kraft der Natur am Meer, perfekt eingefangen.',
        },
        {
          src: '/img/Album/cS-4.jpg',
          alt: 'Weitläufige Ansicht antiker Ruinen oder archäologischer Stätten mit massiven Steinmauern und Bodenstrukturen unter einem dramatisch bewölkten Himmel.',
          title: 'Vergangene Zeiten',
          detail: 'Spuren der Geschichte in Stein gemeißelt – ein Fenster in alte Zivilisationen.',
        },
        {
          src: '/img/Album/cS-5.jpg',
          alt: 'Panorama einer weitläufigen, grünen Hügellandschaft mit den zerfallenen Säulen und Mauerresten einer antiken Stadt.',
          title: 'Geheimnisse der Antike',
          detail: 'Faszination für alte Kulturen und ihre imposanten Bauwerke in der Natur.',
        },
        {
          src: '/img/Album/cS-6.jpg',
          alt: 'Das prachtvolle, reich verzierte Innere einer großen Moschee mit einer beeindruckenden, kunstvollen Kuppel und einem detailreichen rötlichen Gebetsteppich auf dem Boden.',
          title: 'Architektur & Spiritualität',
          detail: 'Inspiration durch Formen, Licht und die ehrwürdige Atmosphäre heiliger Räume.',
        },
      ];

      let currentIndex = 0;

      function updateGallery(index) {
        // Check if index is valid
        if (index < 0) {
          index = galleryData.length - 1; // Wrap around to the end
        } else if (index >= galleryData.length) {
          index = 0; // Wrap around to the beginning
        }
        currentIndex = index;

        // Update main image and description with fade effect
        mainImage.style.opacity = 0; // Start fade out
        setTimeout(() => {
          mainImage.src = galleryData[currentIndex].src;
          mainImage.alt = galleryData[currentIndex].alt;
          imageTitle.textContent = galleryData[currentIndex].title;
          imageDetail.textContent = galleryData[currentIndex].detail;
          mainImage.style.opacity = 1; // Fade in new image
        }, 200); // Duration of the fade-out transition

        // Update active thumbnail class
        thumbnails.forEach((thumb, idx) => {
          if (idx === currentIndex) {
            thumb.classList.add('active');
            // Scroll active thumbnail into view if needed (optional)
            thumb.scrollIntoView({
              behavior: 'smooth',
              inline: 'center',
              block: 'nearest',
            });
          } else {
            thumb.classList.remove('active');
          }
        });
      }

      // Swipe-Unterstützung für Hero-Image auf Touch-Geräten (z.B. iPhone)
      let touchStartX = 0;
      let touchEndX = 0;
      const swipeThreshold = 50; // Mindestabstand für Swipe in px

      const heroImageDisplay = document.querySelector('.hero-image-display');
      heroImageDisplay.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          touchStartX = e.touches[0].clientX;
        }
      });
      heroImageDisplay.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].clientX;
        const diffX = touchEndX - touchStartX;
        if (Math.abs(diffX) > swipeThreshold) {
          if (diffX < 0) {
            // Nach links gewischt -> nächstes Bild
            updateGallery(currentIndex + 1);
          } else {
            // Nach rechts gewischt -> vorheriges Bild
            updateGallery(currentIndex - 1);
          }
        }
      });

      // Event Listeners für Navigation
      prevButton.addEventListener('click', () => {
        updateGallery(currentIndex - 1);
      });

      nextButton.addEventListener('click', () => {
        updateGallery(currentIndex + 1);
      });

      // Event Listener für Thumbnails (Klick und Tap)
      thumbnails.forEach((thumb, index) => {
        thumb.addEventListener('click', () => {
          updateGallery(index);
        });
        thumb.addEventListener('touchend', () => {
          updateGallery(index);
        });
      });

      // Initialize gallery with the first image
      updateGallery(0);
    </script>
  </body>
</html>
