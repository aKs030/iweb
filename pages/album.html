<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Galerie</title>
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/album.css">

     <style>
        body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--main-bg-color);
  color: var(--main-text-color);
  margin: 0;
  padding: 0;
  line-height: 1.8;
}

.foto-galerie {
  padding: 20px;
  text-align: center;
}

.foto-galerie h1 {
  font-size: 2rem;
  color: #333;
  margin-bottom: 20px;
}

.foto-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.foto-item {
  flex: 1 1 200px;
  max-width: 300px;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.foto-item img {
  width: 100%;
  height: auto;
  display: block;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.foto-item:hover img {
  transform: scale(1.1);
  opacity: 0.8;
}
     </style>
</head>
<body>
    <!-- Menü einbinden -->
    <div id="menu-container">
        <script>
            fetch('/pages/komponente/menu.html')
                .then(response => response.text())
                .then(data => document.getElementById('menu-container').innerHTML = data);
        </script>
    </div>

    <!-- Foto-Galerie -->
    <section class="foto-galerie">
        <h1>Foto Galerie</h1>
        <div class="foto-container">
          <div class="foto-item">
            <img src="https://drive.google.com/uc?id=1m6tIKPPOy5mdegEfAOXhWu3ZxlGzn28A" alt="Foto 1">
          </div>
          <div class="foto-item">
            <img src="https://drive.google.com/uc?id=1g8PfqJtg2sS8BYXrEwyX79ZNDo9xF0pU" alt="Foto 2">
          </div>
        </div>
      </section>

    <script src="/js/menu.js"></script>
</body>
</html>
