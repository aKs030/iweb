<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestapelte Foto-Galerie</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gallery {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 80%;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .gallery img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s ease, transform 1s ease;
        }

        .gallery img.visible {
            opacity: 1;
            transform: scale(1);
            z-index: 10;
        }

        .details {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1rem;
            text-align: center;
            z-index: 15;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .details.visible {
            opacity: 1;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #ccc;
        }

        .progress {
            width: 0;
            height: 100%;
            background: #333;
            transition: width 0.5s ease;
        }

        @media (max-width: 768px) {
            .gallery {
                width: 100%;
                height: 70%;
            }

            .details {
                font-size: 0.9rem;
                bottom: 10px;
                padding: 8px 15px;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                width: 100%;
                height: 60%;
            }

            .details {
                font-size: 0.8rem;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="gallery" id="gallery">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczPHdI-JsRmOsOAwdlI38nt4GMcUWI8XIg-RMydI_KtqmiMxFNyYobLWpymDEYdOq5UhZz8LhETl6UPkmDFBciHEa7pjSV2YjB-X3D641wQMQZIeSYZ4TZJEdayfI7MxJ1axu-8vjVB1RNG5RIAbASE=w1336-h1780-s-no?authuser=0" alt="Bild 1">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczPhEQ_3G4aDDjPA3AhbfjehGFTRgiMFl7_-w1LnH3BpjyE3V4wAFhbjak4CkcH_pATX_jCnFBb1VqR5UmqHVSt5HvXLIOUBuVmWkiHHnsiiPCtc15snmiMUnrl-uOrmI0gs50KpX3Fu4FagEwSIsmM=w1336-h1780-s-no?authuser=0" alt="Bild 2">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczNzoEFn87AJaAK5kmO90ZD7cCyz8r3UB4WqYFFuf2my4Idk9zeIaA6Pis7miYA0ksahp2tjcKC6vHaa2YMv7VJD-DKyQiVzNep1A5MvtGNiV94jOpL-HlVo_76ylS6DZauWWVtmuU75BnZonkoHKZg=w1776-h1332-s-no?authuser=0" alt="Bild 3">
        <div class="details" id="details">Bild 1: Beschreibung des ersten Bildes.</div>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll(".gallery img");
        const details = document.getElementById("details");
        const progress = document.getElementById("progress");

        let currentIndex = 0;
        let debounceTimer = null;

        function showImage(index) {
            images.forEach((img, i) => {
                img.classList.toggle("visible", i === index);
            });

            const descriptions = [
                "Bild 1: Beschreibung des ersten Bildes.",
                "Bild 2: Beschreibung des zweiten Bildes.",
                "Bild 3: Beschreibung des dritten Bildes."
            ];

            details.textContent = descriptions[index];
            details.classList.add("visible");
            progress.style.width = `${((index + 1) / images.length) * 100}%`;
        }

        function handleScroll(event) {
            clearTimeout(debounceTimer);

            debounceTimer = setTimeout(() => {
                if (event.deltaY > 0) {
                    // Nach unten scrollen
                    currentIndex = (currentIndex + 1) % images.length;
                } else {
                    // Nach oben scrollen
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                }

                showImage(currentIndex);
            }, 150); // 150ms Pause zwischen Bildwechseln
        }

        // Scroll- und Touch-Unterstützung
        let touchStartY = 0;

        function handleTouchStart(event) {
            touchStartY = event.touches[0].clientY;
        }

        function handleTouchEnd(event) {
            const touchEndY = event.changedTouches[0].clientY;

            if (touchStartY - touchEndY > 50) {
                // Nach oben wischen
                currentIndex = (currentIndex + 1) % images.length;
            } else if (touchEndY - touchStartY > 50) {
                // Nach unten wischen
                currentIndex = (currentIndex - 1 + images.length) % images.length;
            }

            showImage(currentIndex);
        }

        // Event-Listener hinzufügen
        window.addEventListener("wheel", handleScroll);
        window.addEventListener("touchstart", handleTouchStart);
        window.addEventListener("touchend", handleTouchEnd);

        // Initialisiere die Galerie
        showImage(currentIndex);
    </script>
</body>
</html>
