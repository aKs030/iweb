<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixierte, horizontal zentrierte Foto-Galerie</title>
  <style>
    /* Alle Seiteninhalte fixieren – kein scrollen */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Container, der die gesamte Galerie fixiert in der Mitte des Viewports platziert */
    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 800px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Galerie-Container für das Hauptfoto */
    .gallery {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    /* Hauptbild – horizontal (und vertikal) zentriert im Gallery-Container */
    .gallery img.main {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      opacity: 0;
      transition: opacity 1s ease, transform 1s ease;
    }

    .gallery img.main.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      z-index: 10;
    }

    /* Detailbeschreibung, direkt über dem unteren Rand der Galerie */
    .details {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 1rem;
      text-align: center;
      z-index: 15;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .details.visible {
      opacity: 1;
    }

    /* Fortschrittsbalken am unteren Rand der Galerie */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: #ccc;
    }
    .progress {
      width: 0;
      height: 100%;
      background: #333;
      transition: width 0.5s ease;
    }

    /* Navigation-Buttons */
    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: #fff;
      font-size: 2rem;
      padding: 10px;
      cursor: pointer;
      z-index: 20;
      border-radius: 50%;
      user-select: none;
    }
    .nav-button:hover {
      background: rgba(0, 0, 0, 0.7);
    }
    .nav-button.left {
      left: 10px;
    }
    .nav-button.right {
      right: 10px;
    }

    /* Separater Bereich für Thumbnails unterhalb der Galerie */
    .thumbnails {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .thumbnails img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.6;
      border: 2px solid transparent;
      transition: opacity 0.3s ease, border-color 0.3s ease;
    }
    .thumbnails img.active,
    .thumbnails img:hover {
      opacity: 1;
      border-color: #333;
    }

    @media (max-width: 768px) {
      .container {
        width: 100%;
      }
      .thumbnails img {
        width: 60px;
        height: 60px;
      }
    }
    @media (max-width: 480px) {
      .nav-button {
        font-size: 1.5rem;
        padding: 8px;
      }
      .thumbnails img {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="gallery" id="gallery">
      <!-- Hauptbilder -->
      <img class="main" src="https://via.placeholder.com/800x600/111/fff?text=Bild+1" alt="Bild 1">
      <img class="main" src="https://via.placeholder.com/800x600/333/fff?text=Bild+2" alt="Bild 2">
      <img class="main" src="https://via.placeholder.com/800x600/555/fff?text=Bild+3" alt="Bild 3">

      <!-- Detailbeschreibung -->
      <div class="details" id="details">Bild 1: Beschreibung des ersten Bildes.</div>

      <!-- Fortschrittsbalken -->
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>

      <!-- Navigation Buttons -->
      <button class="nav-button left" id="prevBtn">&larr;</button>
      <button class="nav-button right" id="nextBtn">&rarr;</button>
    </div>

    <!-- Thumbnails -->
    <div class="thumbnails" id="thumbnails">
      <img src="https://via.placeholder.com/800x600/111/fff?text=Bild+1" alt="Bild 1" data-index="0">
      <img src="https://via.placeholder.com/800x600/333/fff?text=Bild+2" alt="Bild 2" data-index="1">
      <img src="https://via.placeholder.com/800x600/555/fff?text=Bild+3" alt="Bild 3" data-index="2">
    </div>
  </div>

  <script>
    const images = document.querySelectorAll(".gallery img.main");
    const details = document.getElementById("details");
    const progress = document.getElementById("progress");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const thumbnails = document.querySelectorAll(".thumbnails img");

    let currentIndex = 0;
    let debounceTimer = null;
    let touchStartX = 0;
    let touchStartY = 0;

    function showImage(index) {
      images.forEach((img, i) => {
        img.classList.toggle("visible", i === index);
      });

      const descriptions = [
        "Bild 1: Beschreibung des ersten Bildes.",
        "Bild 2: Beschreibung des zweiten Bildes.",
        "Bild 3: Beschreibung des dritten Bildes."
      ];
      details.textContent = descriptions[index];
      details.classList.add("visible");
      progress.style.width = `${((index + 1) / images.length) * 100}%`;

      thumbnails.forEach((thumb, i) => {
        thumb.classList.toggle("active", i === index);
      });
    }

    function handleScroll(event) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (event.deltaY > 0) {
          currentIndex = (currentIndex + 1) % images.length;
        } else {
          currentIndex = (currentIndex - 1 + images.length) % images.length;
        }
        showImage(currentIndex);
      }, 150);
    }

    function handleTouchStart(event) {
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }

    function handleTouchEnd(event) {
      const touchEndX = event.changedTouches[0].clientX;
      const touchEndY = event.changedTouches[0].clientY;
      const diffX = touchStartX - touchEndX;
      const diffY = touchStartY - touchEndY;
      const threshold = 50;

      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > threshold) {
        if (diffX > 0) {
          currentIndex = (currentIndex + 1) % images.length;
        } else {
          currentIndex = (currentIndex - 1 + images.length) % images.length;
        }
      } else if (Math.abs(diffY) > threshold) {
        if (diffY > 0) {
          currentIndex = (currentIndex + 1) % images.length;
        } else {
          currentIndex = (currentIndex - 1 + images.length) % images.length;
        }
      }
      showImage(currentIndex);
    }

    window.addEventListener("wheel", handleScroll);
    window.addEventListener("touchstart", handleTouchStart);
    window.addEventListener("touchend", handleTouchEnd);

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage(currentIndex);
    });
    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      showImage(currentIndex);
    });

    thumbnails.forEach((thumb) => {
      thumb.addEventListener("click", (e) => {
        currentIndex = parseInt(e.target.dataset.index, 10);
        showImage(currentIndex);
      });
    });

    showImage(currentIndex);
  </script>
</body>
</html>
