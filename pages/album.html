<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Galerie</title>
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/album.css">
</head>
<body>
    <!-- Menü einbinden -->
    <div id="menu-container">
        <script>
            fetch('/pages/komponente/menu.html')
                .then(response => response.text())
                .then(data => document.getElementById('menu-container').innerHTML = data);
        </script>
    </div>

    <!-- Foto-Galerie -->
    <section class="foto-galerie">
        <h1>Foto Galerie</h1>
        <div class="foto-container">
          <div class="foto-item">
            <img src="../img/album/cS-1.jpg" alt="Foto 1">
          </div>
          <div class="foto-item">
            <img src="../img/album/cS-2.jpg" alt="Foto 2">
          </div>
          <div class="foto-item">
            <img src="../img/album/cS-3.jpg" alt="Foto 3">
          </div>
          <div class="foto-item">
            <img src="../img/album/cS-4.jpg" alt="Foto 4">
          </div>
          <div class="foto-item">
            <img src="../img/album/cS-5.jpg" alt="Foto 5">
          </div>
        </div>
      </section>

    <script src="/js/menu.js"></script>
</body>
</html>
