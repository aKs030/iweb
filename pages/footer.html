<div id="cookie-banner">
  <p>Diese Website verwendet Cookies, um Ihr Erlebnis zu verbessern. Akzeptieren Sie unsere Cookies oder passen Sie Ihre Einstellungen an.</p>
  <div class="cookie-buttons">
      <button class="accept">Akzeptieren</button>
      <button class="reject">Ablehnen</button>
      <button class="settings">Einstellungen</button>
  </div>
</div>
<div id="cookie-settings">
  <h3>Cookie-Einstellungen</h3>
  <p>
      Hier können Sie Ihre Cookie-Einstellungen anpassen:
  </p>
  <label>
      <input type="checkbox" id="essential" checked disabled>
      Essentielle Cookies (erforderlich)
  </label><br>
  <label>
      <input type="checkbox" id="analytics">
      Analyse-Cookies
  </label><br>
  <label>
      <input type="checkbox" id="marketing">
      Marketing-Cookies
  </label><br>
  <button class="close">Speichern und Schließen</button>
</div>
<script>
  const cookieBanner = document.getElementById('cookie-banner');
  const cookieSettings = document.getElementById('cookie-settings');
  document.querySelector('.accept').addEventListener('click', () => {
      document.cookie = "cookiesAccepted=true; path=/; max-age=31536000";
      document.cookie = "analyticsCookies=true; path=/; max-age=31536000";
      document.cookie = "marketingCookies=true; path=/; max-age=31536000";
      cookieBanner.style.display = 'none';
  });
  document.querySelector('.reject').addEventListener('click', () => {
      document.cookie = "cookiesAccepted=false; path=/; max-age=31536000";
      document.cookie = "analyticsCookies=false; path=/; max-age=31536000";
      document.cookie = "marketingCookies=false; path=/; max-age=31536000";
      cookieBanner.style.display = 'none';
  });
  document.querySelector('.settings').addEventListener('click', () => {
      cookieSettings.style.display = 'block';
  });
  document.querySelector('.close').addEventListener('click', () => {
      const analytics = document.getElementById('analytics').checked;
      const marketing = document.getElementById('marketing').checked;

      document.cookie = `analyticsCookies=${analytics}; path=/; max-age=31536000`;
      document.cookie = `marketingCookies=${marketing}; path=/; max-age=31536000`;
      document.cookie = "cookiesAccepted=true; path=/; max-age=31536000";

      cookieSettings.style.display = 'none';
      cookieBanner.style.display = 'none';
  });
  // Check if cookies were already accepted/rejected
  const cookies = document.cookie.split('; ').reduce((acc, cookie) => {
      const [key, value] = cookie.split('=');
      acc[key] = value;
      return acc;
  }, {});
  if (cookies.cookiesAccepted) {
      cookieBanner.style.display = 'none';
  }
</script>
