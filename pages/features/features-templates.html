<!-- Feature Templates (alle zusammengeführt) -->
<style>
    /* -- Features Cards (Snap Section) -- */
.features { 
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: transparent;
  scroll-snap-align: center;
}
.features-cards { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); 
  gap: 1.25rem; 
  width: 100%; 
  max-width: 880px; 
  margin-inline: auto; 
}
.features .card { 
  padding: clamp(1.2rem, 2.5vw, 1.9rem);
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column; gap: 0.85rem; 
  transition: transform var(--transition-base), box-shadow var(--transition-base), border-color var(--transition-base);
}
.features .card:hover { 
  transform: translateY(-4px) scale(1.01);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary-color);
}
.features .card .icon-wrapper i { font-size: clamp(1.8rem, 3.2vw, 2.4rem); }

.features .card-title {
  font-weight: 650;
  font-size: clamp(1.05rem, 2.2vw, 1.35rem);
  letter-spacing: -0.015em;
  line-height: 1.3;
  color: var(--text-primary);
}
.features .card-title[data-eyebrow]::before {
  content: attr(data-eyebrow);
  display: block;
  margin-bottom: 0.35rem;
  font-size: 0.7rem;
  line-height: 1;
  font-weight: 650;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--primary-color);
  opacity: 0.9;
}
.features .card-text {
  font-size: clamp(0.88rem, 1.5vw, 1rem);
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.6;
  opacity: 0.85;
}

@media (max-width: 680px){
  .features-cards { grid-template-columns: 1fr; }
}

/* === FeatureRotation (leichtgewichtig) === */
#section-features { will-change: opacity, transform; }
.fr-enter   { opacity: 0; transform: translateY(10px); }
.fr-enter.fr-enter-active { transition: all .4s cubic-bezier(.25,.46,.45,.94); opacity: 1; transform: translateY(0); }
.fr-exit    { opacity: 1; transform: translateY(0); }
.fr-exit.fr-exit-active  { transition: all .2s cubic-bezier(.25,.46,.45,.94); opacity: 0; transform: translateY(-5px); }
</style>
