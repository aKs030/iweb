<!-- Features – Bereinigt & Verschlankt -->
<style>
  /* =======================
     Root & Base
  ======================= */
  :root{
    --primary-color:#098bff;
    --primary-light:#00d4ff;
    --text-primary:#fff;
    --text-secondary:#b0b0b0;
    --bg-dark:#0a0a0a;

    --radius-lg:16px;
    --shadow-md:0 4px 12px rgba(0,0,0,.15);
    --shadow-lg:0 8px 24px rgba(0,0,0,.2);
    --t: .3s ease;

    /* Abstände als Token */
    --pad-x: clamp(1rem,4vw,2rem);
    --gap: clamp(1rem,3vw,1.5rem);
    --card-pad: clamp(1rem,3.5vw,2rem);
  }

  body{
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg-dark);
    color:var(--text-primary);
    margin:0;
    padding:2rem;
    line-height:1.6;
  }

  /* =======================
     Section & Layout
  ======================= */
  .features{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:transparent;min-height:100vh;padding:2rem 0;
  }

  .features-content{
    width:100%;max-width:1200px;margin:0 auto;
    display:flex;flex-direction:column;align-items:center;
    padding:0 var(--pad-x);
  }

  .section-header{ text-align:center; margin-bottom:2.5rem; }
  .section-title{ font-size:clamp(2rem,4vw,3rem); margin:0 0 .5rem; font-weight:700; letter-spacing:-.015em; }
  .section-subtitle{ font-size:clamp(1rem,2vw,1.25rem); color:var(--text-secondary); margin:0; }

  .features-cards{
    display:grid; width:100%; max-width:1000px;
    grid-template-columns:repeat(auto-fit, minmax(min(100%,280px),1fr));
    gap:var(--gap);
  }

  /* =======================
     Card
  ======================= */
  .features .card{
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; gap:.75rem;
    padding:var(--card-pad);
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md);
    transition:transform var(--t), box-shadow var(--t), border-color var(--t), background var(--t);
  }

  .features .card::before{
    content:""; position:absolute; inset:0 0 auto 0; height:3px;
    background:linear-gradient(90deg,var(--primary-color),var(--primary-light));
    transform:scaleX(0); transform-origin:left; transition:transform var(--t);
  }

  .features .card:hover{
    transform:translateY(-6px);
    box-shadow:var(--shadow-lg);
    border-color:rgba(9,139,255,.3);
    background:rgba(255,255,255,.08);
  }
  .features .card:hover::before{ transform:scaleX(1); }

  .icon-wrapper{
    display:flex;align-items:center;justify-content:center;
    width:clamp(46px,10vw,65px);height:clamp(46px,10vw,65px);
    background:rgba(9,139,255,.1);
    border-radius:12px;margin-bottom:.25rem;
    transition:transform var(--t), background var(--t);
  }
  .features .card:hover .icon-wrapper{ background:rgba(9,139,255,.2); transform:scale(1.05); }

  .features .card .icon-wrapper i{ font-size:clamp(1.6rem,5vw,2.25rem); line-height:1; }

  .card-title{
    margin:0; font-weight:600; letter-spacing:-.01em; line-height:1.3;
    font-size:clamp(1.05rem,3vw,1.35rem); color:var(--text-primary);
  }
  .card-title[data-eyebrow]::before{
    content:attr(data-eyebrow); display:block; margin-bottom:.45rem;
    font-size:clamp(.7rem,1.8vw,.8rem); line-height:1.2; font-weight:600;
    letter-spacing:.08em; text-transform:uppercase; color:var(--primary-color); opacity:.9;
  }

  .card-text{
    margin:0; color:var(--text-secondary);
    font-size:clamp(.9rem,2.2vw,1.02rem); line-height:1.55;
    /* Kein flex:1 -> gleiche Höhe ist nice-to-have, aber erzeugt auf Mobile oft unnötige Stretchs */
  }

  /* =======================
     Responsive
  ======================= */
  @media (max-width:768px){
    .features{ padding:1.5rem 0 1.75rem; }
    .section-header{ margin-bottom:1.75rem; }
    .features-cards{ grid-template-columns:1fr; gap:.65rem; max-width:100%; }
    .features .card{ padding:.85rem .95rem .95rem; }
    .card-title{ font-size:1.05rem; }
    .card-text{ font-size:.9rem; line-height:1.5; }
  }

  @media (max-width:480px){
    .features .card{ padding:.75rem .85rem .85rem; }
    .icon-wrapper{ width:46px; height:46px; }
    .card-title{ font-size:1rem; }
    .card-text{ font-size:.85rem; }
  }

  @media (min-width:769px) and (max-width:1024px){
    .features-cards{ grid-template-columns:repeat(2,1fr); gap:1rem; }
  }
  @media (min-width:1025px){
    .features-cards{ grid-template-columns:repeat(3,1fr); gap:1.75rem; }
    .features .card{ min-height:200px; } /* Nur Desktop: sorgt für harmonische Höhe */
  }

  /* =======================
     Touch & Motion
  ======================= */
  @media (hover:none) and (pointer:coarse){
    .features .card:hover{ transform:none; }
    .features .card:active{ transform:scale(.98); transition:transform .1s ease; }
  }
  @media (prefers-reduced-motion:reduce){
    .features .card, .features .card::before, .icon-wrapper{ transition:none; }
    .features .card:hover{ transform:none; }
  }

  /* =======================
     Einheitliche Animations-Hooks
     (ersetzen fadeInUp/Left/Right/Zoom durch 1–2 Basisklassen)
  ======================= */
  [data-anim="enter-up"]{ opacity:0; transform:translateY(18px); }
  [data-anim="enter-down"]{ opacity:0; transform:translateY(-18px); }
  .is-visible[data-anim]{ opacity:1; transform:none; transition:opacity .5s cubic-bezier(.4,0,.3,1), transform .5s cubic-bezier(.4,0,.3,1); }
</style>
