<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jump & Run – High Resolution + Long-Press-Fix (Ohne Punkte, Botsramp)</title>

  <style>
    /* ========== Grundlegende Reset-Styles ========== */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;             /* Kein Scrollen */
      background: #87ceeb;          /* Hellblau */
      
      /* Verhindert Textauswahl und Kontextmenü auf iOS & Co. */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: none;           /* blockiert Scrollen/Zoomen bei Wisch */

      /* Option: Bei iOS Long-Press wird kein Highlighting gezeigt */
      -webkit-tap-highlight-color: transparent;
    }

    /* Container für Canvas + Overlays */
    #gameContainer {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ========== Canvas ========== 
       Interne Auflösung: 720 × 1280; 
       CSS skaliert das Canvas großflächig. */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #87ceeb;
    }

    /* 
      ========== „Botsramp“-Steuerungsflächen ========== 
      Du kannst diese DIVs frei positionieren und gestalten.
      Hier ein Beispiel mit halbtransparenten Flächen am unteren Bildschirmrand.
    */
    .controls {
      position: absolute;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .botsramp-button {
      /* Hier kannst du die Größe, Farbe, Transparenz etc. anpassen */
      width: 100px;
      height: 50px;
      margin: 5px;
      font-size: 18px;

      background: rgba(0, 0, 0, 0.2); /* leicht transparent */
      border: 2px solid #000;
      
      /* Verhindert Textauswahl, Kontextmenü, grauen Tap-Effekt bei iOS */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========== Game Over Menü ========== */
    #gameOverMenu {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border: 2px solid #000;
      padding: 20px;
      text-align: center;
      z-index: 999;
    }
    #gameOverMenu button {
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="gameContainer">
  <!-- Das Canvas mit hoher "logischer" Auflösung (720×1280) -->
  <canvas id="gameCanvas" width="720" height="1280"></canvas>

  <!-- Touch-Flächen (Botsramp) -->
  <div class="controls">
    <div class="botsramp-button" id="leftArea" data-action="left">Links</div>
    <div class="botsramp-button" id="jumpArea" data-action="jump">Springen</div>
    <div class="botsramp-button" id="rightArea" data-action="right">Rechts</div>
  </div>

  <!-- Game-Over-Menü -->
  <div id="gameOverMenu">
    <h1>Game Over</h1>
    <p id="gameOverMessage"></p>
    <button onclick="neustart()">Neustart</button>
    <button onclick="verlassen()">Verlassen</button>
  </div>
</div>

<script>
/* ========== Kontextmenü bei Long-Press komplett blockieren ========== */
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
}, false);

/* ========== Canvas & Retina-Setup ========== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Device Pixel Ratio (z.B. iPhone 2x oder 3x Pixel)
const dpr = window.devicePixelRatio || 1;
const LOGICAL_WIDTH  = canvas.width;   // 720
const LOGICAL_HEIGHT = canvas.height;  // 1280

// Canvas mit der DPI skalieren
canvas.width  = LOGICAL_WIDTH  * dpr;
canvas.height = LOGICAL_HEIGHT * dpr;
ctx.scale(dpr, dpr);

/* ========== Spiel-Variablen ========== */
const BODEN_HOEHE = 280;

let level = 1;
let hindernisse = [];
let gegner = null;
let gameOver = false;

// Spieler-Objekt
const spieler = {
  x: 100,
  y: 0,
  breite: 50,
  hoehe: 50,
  farbe: 'red',
  vx: 4,            // horizontale Geschwindigkeit
  vy: 0,            // vertikale Geschwindigkeit
  sprungKraft: 20,  // Sprunghöhe
  schwerkraft: 0.8, // Gravitation
  amBoden: false,
  bewegt: false,
  richtung: 0       // -1 = links, 1 = rechts
};

/* ========== Level laden ========== */
function ladeLevel(stufe) {
  hindernisse = [];
  gegner = null;

  if (stufe === 1) {
    hindernisse.push({ x: 600,  y: LOGICAL_HEIGHT - BODEN_HOEHE - 60, breite: 60, hoehe: 60 });
    hindernisse.push({ x: 1000, y: LOGICAL_HEIGHT - BODEN_HOEHE - 80, breite: 60, hoehe: 80 });
    
    gegner = {
      x: 1200,
      y: LOGICAL_HEIGHT - BODEN_HOEHE - 50,
      breite: 50,
      hoehe: 50,
      farbe: 'purple',
      speed: 3,
      minX: 1150,
      maxX: 1350
    };
  }
  else if (stufe === 2) {
    hindernisse.push({ x: 500,  y: LOGICAL_HEIGHT - BODEN_HOEHE - 100, breite: 70, hoehe: 100 });
    hindernisse.push({ x: 900,  y: LOGICAL_HEIGHT - BODEN_HOEHE - 60,   breite: 60, hoehe: 60  });
    hindernisse.push({ x: 1400, y: LOGICAL_HEIGHT - BODEN_HOEHE - 120, breite: 50, hoehe: 120 });

    gegner = {
      x: 1100,
      y: LOGICAL_HEIGHT - BODEN_HOEHE - 50,
      breite: 50,
      hoehe: 50,
      farbe: 'blue',
      speed: 4,
      minX: 1050,
      maxX: 1300
    };
  }
}

/* ========== Zeichnen ========== */
function zeichneHintergrund() {
  // Himmel
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

  // Boden
  ctx.fillStyle = 'green';
  ctx.fillRect(0, LOGICAL_HEIGHT - BODEN_HOEHE, LOGICAL_WIDTH, BODEN_HOEHE);
}

function zeichneSpieler() {
  ctx.fillStyle = spieler.farbe;
  ctx.fillRect(spieler.x, spieler.y, spieler.breite, spieler.hoehe);
}

function zeichneHindernisse() {
  ctx.fillStyle = 'brown';
  hindernisse.forEach(obj => {
    ctx.fillRect(obj.x, obj.y, obj.breite, obj.hoehe);
  });
}

function zeichneGegner() {
  if (!gegner) return;
  ctx.fillStyle = gegner.farbe;
  ctx.fillRect(gegner.x, gegner.y, gegner.breite, gegner.hoehe);
}

function zeichneHud() {
  // Nur das Level anzeigen, keine Punkte
  ctx.fillStyle = 'black';
  ctx.font = '28px Arial';
  ctx.fillText(`Level: ${level}`, 20, 50);
}

/* ========== Update-Logik ========== */
function updateSpieler() {
  // Bewegung X
  if (spieler.bewegt) {
    spieler.x += spieler.richtung * spieler.vx;
  }

  // Schwerkraft
  spieler.vy += spieler.schwerkraft;
  spieler.y += spieler.vy;

  // Boden-Kollision
  if (spieler.y + spieler.hoehe >= LOGICAL_HEIGHT - BODEN_HOEHE) {
    spieler.y = LOGICAL_HEIGHT - BODEN_HOEHE - spieler.hoehe;
    spieler.amBoden = true;
    spieler.vy = 0;
  } else {
    spieler.amBoden = false;
  }

  // Level-Wechsel, wenn Spieler rechts rausläuft
  if (spieler.x > LOGICAL_WIDTH) {
    if (level === 1) {
      level = 2;
      resetSpielerPosition();
      ladeLevel(level);
    } else {
      // Kein weiteres Level? Dann Spiel-Ende "gewonnen"
      spielBeenden("Du hast alle Levels gemeistert!");
    }
  }
}

function updateGegner() {
  if (!gegner) return;
  gegner.x += gegner.speed;

  // Einfaches Hin- und Her
  if (gegner.x < gegner.minX || (gegner.x + gegner.breite) > gegner.maxX) {
    gegner.speed *= -1;
  }
}

function pruefeKollisionen() {
  // Spieler vs. Hindernisse
  for (let h of hindernisse) {
    if (istKollision(spieler, h)) {
      spielBeenden("Gegen ein Hindernis gerannt!");
      return;
    }
  }
  // Spieler vs. Gegner
  if (gegner && istKollision(spieler, gegner)) {
    spielBeenden("Vom Gegner erwischt!");
  }
}

function istKollision(a, b) {
  return (
    a.x < b.x + b.breite &&
    a.x + a.breite > b.x &&
    a.y < b.y + b.hoehe &&
    a.y + a.hoehe > b.y
  );
}

/* ========== Game Over / Neustart ========== */
function spielBeenden(nachricht) {
  gameOver = true;
  document.getElementById('gameOverMessage').innerText = nachricht;
  document.getElementById('gameOverMenu').style.display = 'block';
}

function neustart() {
  document.getElementById('gameOverMenu').style.display = 'none';
  level = 1;
  gameOver = false;
  resetSpielerPosition();
  ladeLevel(level);
  gameLoop();
}

function verlassen() {
  alert("Spiel kann auf Mobilgeräten nicht einfach geschlossen werden. Bitte Tab oder App beenden.");
}

/* ========== Hilfsfunktionen ========== */
function resetSpielerPosition() {
  spieler.x = 100;
  spieler.y = LOGICAL_HEIGHT - BODEN_HOEHE - spieler.hoehe;
  spieler.vy = 0;
  spieler.bewegt = false;
  spieler.richtung = 0;
}

/* ========== Game-Loop ========== */
function gameLoop() {
  if (gameOver) return;

  ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

  updateSpieler();
  updateGegner();
  pruefeKollisionen();

  zeichneHintergrund();
  zeichneHindernisse();
  zeichneGegner();
  zeichneSpieler();
  zeichneHud();

  requestAnimationFrame(gameLoop);
}

/* ========== Steuerung (Pointer Events) ========== */
function onPointerDown(e) {
  e.preventDefault(); // Gegen Kontextmenü, Textauswahl etc.

  // Per data-Attribut auslesen, welche Aktion gewollt ist
  const action = e.target.getAttribute('data-action');
  if (!action) return;

  if (action === 'left') {
    spieler.bewegt = true;
    spieler.richtung = -1;
  }
  else if (action === 'right') {
    spieler.bewegt = true;
    spieler.richtung = 1;
  }
  else if (action === 'jump' && spieler.amBoden) {
    spieler.vy = -spieler.sprungKraft;
  }
}

function onPointerUp(e) {
  e.preventDefault();
  const action = e.target.getAttribute('data-action');
  if (!action) return;

  // Bei Loslassen von Links/Rechts den Spieler stoppen
  if (action === 'left' || action === 'right') {
    spieler.bewegt = false;
  }
}

// „Botsramp“-Flächen anbinden
['leftArea', 'rightArea', 'jumpArea'].forEach(id => {
  const area = document.getElementById(id);
  area.addEventListener('pointerdown', onPointerDown);
  area.addEventListener('pointerup', onPointerUp);
  area.addEventListener('pointercancel', onPointerUp);
});

// Tastatursupport (optional)
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
        spieler.bewegt = true;
        spieler.richtung = -1;
    } else if (e.key === 'ArrowRight') {
        spieler.bewegt = true;
        spieler.richtung = 1;
    } else if (e.key === ' ' && spieler.amBoden) { // Space-Taste für Springen
        spieler.vy = -spieler.sprungKraft;
    }
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        spieler.bewegt = false;
    }
});

/* ========== Initialer Start ========== */
ladeLevel(level);
resetSpielerPosition();
gameLoop();
</script>
</body>
</html>
