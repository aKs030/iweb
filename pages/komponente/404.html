<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden</title>
    <meta
      name="description"
      content="Die angeforderte Seite konnte nicht gefunden werden."
    >
    <meta name="robots" content="noindex, follow">

    <style>
      :root {
        --color-bg: #393939;
        --color-text: #f5f5f5;
        --color-accent: #3a85ff;
        --color-error: #ff6b6b;
        --font-family:
          'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-family);
        background-color: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
        position: relative;
      }

      /* Animated Background */
      .bg-animation {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }

      .bg-animation::before,
      .bg-animation::after {
        content: '404';
        position: absolute;
        font-size: 20vw;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.02);
        animation: float 20s infinite ease-in-out;
      }

      .bg-animation::before {
        top: -10%;
        left: -10%;
        animation-delay: 0s;
      }

      .bg-animation::after {
        bottom: -10%;
        right: -10%;
        animation-delay: 10s;
      }

      .error-container {
        max-width: 600px;
        width: 100%;
        text-align: center;
        z-index: 1;
        animation: fadeInUp 0.8s ease-out;
      }

      .error-code {
        font-size: 8rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 1rem;
        background: linear-gradient(
          135deg,
          var(--color-error) 0%,
          var(--color-accent) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: glitch 3s infinite;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: 600;
      }

      p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        opacity: 0.9;
        line-height: 1.6;
      }

      .error-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background-color: var(--color-accent);
        color: white;
      }

      .btn-primary:hover {
        background-color: #2d6ce5;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(58, 133, 255, 0.3);
      }

      .btn-secondary {
        background-color: rgba(255, 255, 255, 0.1);
        color: var(--color-text);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .btn-secondary:hover {
        background-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
      }

      .search-box {
        margin-top: 3rem;
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .search-box h2 {
        font-size: 1.3rem;
        margin-bottom: 1rem;
      }

      .search-form {
        display: flex;
        gap: 0.5rem;
        max-width: 400px;
        margin: 0 auto;
      }

      .search-input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 0.25rem;
        background: rgba(255, 255, 255, 0.1);
        color: var(--color-text);
        font-size: 1rem;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--color-accent);
        background: rgba(255, 255, 255, 0.15);
      }

      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        25% {
          transform: translateY(-20px) rotate(3deg);
        }
        75% {
          transform: translateY(20px) rotate(-3deg);
        }
      }

      @keyframes glitch {
        0%,
        100% {
          text-shadow: none;
        }
        95% {
          text-shadow:
            2px 2px 0 var(--color-error),
            -2px -2px 0 var(--color-accent);
        }
      }

      @media (max-width: 600px) {
        .error-code {
          font-size: 6rem;
        }

        h1 {
          font-size: 1.5rem;
        }

        p {
          font-size: 1rem;
        }

        .error-actions {
          flex-direction: column;
          width: 100%;
        }

        .btn {
          width: 100%;
          justify-content: center;
        }

        .search-form {
          flex-direction: column;
        }
      }

      /* Light mode support */
      @media (prefers-color-scheme: light) {
        :root {
          --color-bg: #f0f2f5;
          --color-text: #1c1e21;
        }

        .bg-animation::before,
        .bg-animation::after {
          color: rgba(0, 0, 0, 0.02);
        }

        .btn-secondary {
          background-color: rgba(0, 0, 0, 0.05);
          border-color: rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:hover {
          background-color: rgba(0, 0, 0, 0.08);
        }

        .search-box {
          background: rgba(0, 0, 0, 0.03);
          border-color: rgba(0, 0, 0, 0.08);
        }

        .search-input {
          background: white;
          border-color: rgba(0, 0, 0, 0.1);
          color: var(--color-text);
        }

        .search-input::placeholder {
          color: rgba(0, 0, 0, 0.5);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-animation"></div>

    <div class="error-container">
      <div class="error-code">404</div>

      <h1>Seite nicht gefunden</h1>

      <p>
        Die Seite, die Sie suchen, existiert leider nicht. Möglicherweise wurde
        sie verschoben oder der Link ist fehlerhaft.
      </p>

      <div class="error-actions">
        <a href="/" class="btn btn-primary"> 🏠 Zur Startseite </a>
        <button type="button" class="btn btn-secondary" onclick="history.back()">
          ← Zurück
        </button>
      </div>

      <div class="search-box">
        <h2>Wonach suchen Sie?</h2>
        <form class="search-form" action="/search" method="GET">
          <input
            type="search"
            name="q"
            class="search-input"
            placeholder="Suchbegriff eingeben..."
            required
          >
          <button type="submit" class="btn btn-primary">🔍 Suchen</button>
        </form>
      </div>
    </div>

    <script>
      // Log 404 error to analytics if available
      if (typeof gtag === 'function') {
        gtag('event', 'page_not_found', {
          page_location: window.location.href,
          page_referrer: document.referrer,
        });
      }

      // Auto-redirect to home after 30 seconds
      setTimeout(() => {
        window.location.href = '/';
      }, 30000);
    </script>
  </body>
</html>
