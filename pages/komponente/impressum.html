<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <title>Impressum - Abdulkerim</title>
    <meta name="description" content="Impressum und rechtliche Angaben zu Abdulkerim und der Website gemäß § 5 TMG, Datenschutzbeauftragter und weitere rechtliche Informationen.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#3a85ff">
    <meta name="robots" content="noindex, follow">
    
    <link rel="stylesheet" href="/css/_global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
      /* Erweiterte Styles für die Impressum-Seite */
      body {
        background: var(--color-bg);
      }
      
      .impressum-hero {
        background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        color: white;
        padding: 3rem 1rem;
        text-align: center;
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
      }
      
      .impressum-hero::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--color-accent), var(--color-accent-hover));
      }
      
      .impressum-hero h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: 0.5rem;
        text-transform: none;
        letter-spacing: normal;
      }
      
      .impressum-hero p {
        font-size: 1.1rem;
        opacity: 0.9;
      }
      
      .impressum-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 1rem 3rem;
      }
      
      .impressum-section {
        background: var(--color-bg-secondary);
        border-radius: var(--border-radius);
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: 0 4px 20px var(--color-shadow-dark);
        position: relative;
        overflow: hidden;
      }
      
      .impressum-section::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--color-accent);
      }
      
      .impressum-section h2 {
        color: var(--color-accent);
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      
      .impressum-section h2 i {
        font-size: 1.2rem;
      }
      
      .impressum-section h3 {
        color: var(--color-text-main);
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        font-size: 1.2rem;
      }
      
      .contact-info {
        display: grid;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      
      .contact-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
        background: var(--color-bg);
        border-radius: calc(var(--border-radius) / 2);
        transition: background 0.3s ease;
      }
      
      .contact-item:hover {
        background: rgba(58, 133, 255, 0.05);
      }
      
      .contact-item i {
        color: var(--color-accent);
        width: 30px;
        text-align: center;
        font-size: 1.2rem;
      }
      
      .contact-item-content {
        flex: 1;
      }
      
      .contact-item-content strong {
        display: block;
        color: var(--color-text-main);
        margin-bottom: 0.25rem;
      }
      
      .contact-item-content a {
        color: var(--color-link);
        text-decoration: none;
        transition: color 0.3s ease;
      }
      
      .contact-item-content a:hover {
        color: var(--color-accent-hover);
        text-decoration: underline;
      }
      
      .legal-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }
      
      .legal-card {
        background: var(--color-bg);
        padding: 1.5rem;
        border-radius: calc(var(--border-radius) / 2);
        border: 1px solid var(--color-shadow-dark);
      }
      
      .legal-card h4 {
        color: var(--color-accent);
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }
      
      .legal-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      
      .legal-card li {
        padding: 0.5rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--color-text-muted);
      }
      
      .legal-card li:last-child {
        border-bottom: none;
      }
      
      .legal-card li a {
        color: var(--color-link);
        text-decoration: none;
      }
      
      .legal-card li a:hover {
        text-decoration: underline;
      }
      
      .disclaimer {
        background: rgba(255, 193, 7, 0.1);
        border: 1px solid rgba(255, 193, 7, 0.3);
        border-radius: calc(var(--border-radius) / 2);
        padding: 1.5rem;
        margin-top: 1.5rem;
      }
      
      .disclaimer h4 {
        color: #ffc107;
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }
      
      /* Optional: Responsive Anpassungen */
      @media (max-width: 600px) {
        .impressum-section, .legal-card, .disclaimer {
          padding: 1rem;
        }
        .impressum-hero {
          padding: 2rem 0.5rem;
        }
      }
