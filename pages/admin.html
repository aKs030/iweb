<!doctype html>
<html lang="de">
  <head>
    <!-- INJECT:GLOBAL-HEAD mode="standalone" title="Admin Dashboard | Portfolio" theme-color="#030303" color-scheme="dark" status-bar-style="black-translucent" app-title="Dashboard" -->
    <link rel="stylesheet" href="/content/styles/admin.css?v=20260316-7" />
  </head>
  <body class="immersive-shell admin-page">
    <div class="admin-background" aria-hidden="true">
      <div class="admin-background__glow admin-background__glow--primary"></div>
      <div
        class="admin-background__glow admin-background__glow--secondary"
      ></div>
      <div class="admin-background__grid"></div>
    </div>

    <div id="auth-overlay" class="auth-overlay">
      <div class="auth-card">
        <h2>Login</h2>

        <label class="auth-field">
          <span class="auth-field__label">Admin Passwort</span>
          <input
            type="password"
            id="admin-password"
            class="auth-input"
            placeholder="Passwort eingeben"
            autocomplete="current-password"
          />
        </label>

        <button id="login-button" class="auth-button">Login</button>
        <p id="auth-error" class="auth-error" hidden>Falsches Passwort!</p>
      </div>
    </div>

    <div class="admin-unified">
      <header class="admin-unified__header">
        <div class="admin-unified__toolbar">
          <span
            id="system-state"
            class="admin-unified__meta-text"
            hidden
          ></span>
          <span id="last-update" class="admin-unified__timestamp">Lädt...</span>
          <button
            id="logout-button"
            class="admin-secondary-button admin-icon-button"
            type="button"
            aria-label="Abmelden"
            title="Abmelden"
          >
            <span aria-hidden="true">⎋</span>
          </button>
        </div>
      </header>

      <main id="admin-main" class="admin-unified__main" hidden>
        <section class="admin-unified__list-panel">
          <div class="admin-unified__panel-head">
            <div class="admin-unified__counters">
              <span id="records-count" class="admin-lite__count">0</span>
              <span id="memory-count" class="admin-lite__count">0</span>
            </div>
          </div>

          <ul id="records-list" class="admin-unified__list"></ul>
          <div id="records-pagination" class="admin-unified__pagination" hidden>
            <button
              id="records-page-prev"
              class="admin-secondary-button"
              type="button"
              data-admin-action="records-page-prev"
            >
              Zurück
            </button>
            <span id="records-page-info" class="admin-lite__count"
              >Seite 1 / 1</span
            >
            <button
              id="records-page-next"
              class="admin-secondary-button"
              type="button"
              data-admin-action="records-page-next"
            >
              Weiter
            </button>
          </div>
          <p id="no-records" class="admin-empty-state" hidden>
            Keine Einträge vorhanden.
          </p>
        </section>

        <section id="details-panel" class="admin-unified__action-panel">
          <div class="admin-unified__panel-head">
            <span id="selected-type" class="admin-lite__count" hidden></span>
          </div>

          <p id="selected-summary" class="admin-selected-summary"></p>

          <dl id="selected-details" class="admin-unified__details" hidden></dl>
          <pre
            id="selected-content"
            class="admin-unified__content"
            hidden
          ></pre>
        </section>
      </main>
    </div>

    <div id="admin-toast-container" class="admin-toast-container"></div>
    <script type="module" src="/pages/admin/admin-app.js?v=20260316-7"></script>
  </body>
</html>
